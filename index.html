<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AstroAxis — AI-powered world news aggregator</title>
  <meta name="description" content="AstroAxis — AI-powered world news aggregator" />
  <style>
    :root {
      --bg: #050611;
      --text: #eef7ff;
      --muted: #8892b6;
      --cyan: #22d3ee;
      --cyan-soft: #67e8f9;
      --accent: #6366f1;
      --violet: #a78bfa;
      --orange: #f59e0b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      min-height: 100%;
      overflow: hidden;
      background: #000;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
    }

    body {
      min-height: 100dvh;
      background:
        radial-gradient(circle at 68% 44%, rgba(34, 211, 238, 0.17), transparent 25%),
        radial-gradient(circle at 45% 54%, rgba(99, 102, 241, 0.22), transparent 28%),
        radial-gradient(circle at 18% 24%, rgba(245, 158, 11, 0.08), transparent 22%),
        linear-gradient(135deg, #02030a 0%, #050611 46%, #08091c 100%);
    }

    #hero {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      isolation: isolate;
    }

    #hero::before,
    #hero::after {
      content: "";
      position: absolute;
      inset: -18%;
      z-index: 0;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    #hero::before {
      opacity: 0.48;
      background:
        conic-gradient(from 224deg at 61% 45%, transparent 0deg, rgba(34, 211, 238, 0.18) 34deg, transparent 78deg, rgba(99, 102, 241, 0.16) 126deg, transparent 180deg, rgba(34, 211, 238, 0.10) 260deg, transparent 360deg);
      filter: blur(42px) saturate(1.25);
      animation: auroraDrift 18s ease-in-out infinite alternate;
    }

    #hero::after {
      opacity: 0.18;
      background-image:
        linear-gradient(rgba(255,255,255,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.045) 1px, transparent 1px);
      background-size: 78px 78px;
      mask-image: radial-gradient(circle at 55% 48%, black 0%, transparent 68%);
      transform: perspective(900px) rotateX(63deg) translateY(17%);
    }

    #globe-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      cursor: grab;
      touch-action: none;
      z-index: 0;
      filter: saturate(1.14) contrast(1.06) drop-shadow(0 0 34px rgba(34, 211, 238, 0.18));
    }

    #globe-canvas:active { cursor: grabbing; }


    .filter-bar {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      width: min(920px, calc(100vw - 32px));
      padding: 10px 12px;
      border: 1px solid rgba(103, 232, 249, 0.24);
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(8, 14, 31, 0.72), rgba(3, 6, 18, 0.58));
      backdrop-filter: blur(18px) saturate(1.2);
      -webkit-backdrop-filter: blur(18px) saturate(1.2);
      box-shadow: 0 22px 80px rgba(0, 0, 0, 0.32), 0 0 42px rgba(34, 211, 238, 0.14), inset 0 1px 0 rgba(255,255,255,0.08), inset 0 0 28px rgba(99, 102, 241, 0.08);
    }

    .filter-btn {
      appearance: none;
      border: 1px solid rgba(136, 136, 160, 0.28);
      border-radius: 999px;
      background: rgba(15, 22, 44, 0.64);
      color: rgba(238, 247, 255, 0.80);
      cursor: pointer;
      font: inherit;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 8px 12px;
      text-transform: uppercase;
      transition: border-color 160ms ease, color 160ms ease, background 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    .filter-btn:hover,
    .filter-btn.active {
      border-color: rgba(34, 211, 238, 0.72);
      background: rgba(34, 211, 238, 0.14);
      color: #eaffff;
      box-shadow: 0 0 18px rgba(34, 211, 238, 0.22);
      transform: translateY(-1px);
    }

    .filter-btn[data-filter-type="topic"][data-filter-value="Bitcoin"].active { border-color: rgba(249, 115, 22, 0.85); box-shadow: 0 0 20px rgba(249, 115, 22, 0.2); }
    .filter-btn[data-filter-type="topic"][data-filter-value="DeFi"].active { border-color: rgba(34, 197, 94, 0.85); box-shadow: 0 0 20px rgba(34, 197, 94, 0.2); }
    .filter-btn[data-filter-type="topic"][data-filter-value="AI"].active { border-color: rgba(59, 130, 246, 0.85); box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
    .filter-btn[data-filter-type="topic"][data-filter-value="Regulation"].active { border-color: rgba(239, 68, 68, 0.85); box-shadow: 0 0 20px rgba(239, 68, 68, 0.2); }

    .article-tooltip {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 5;
      width: min(340px, calc(100vw - 28px));
      pointer-events: none;
      opacity: 0;
      transform: translate3d(-999px, -999px, 0) scale(0.96);
      transition: opacity 120ms ease;
      will-change: transform;
      border: 1px solid rgba(34, 211, 238, 0.34);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(7, 10, 22, 0.94), rgba(3, 6, 16, 0.9));
      box-shadow: 0 0 34px rgba(34, 211, 238, 0.18), inset 0 0 24px rgba(99, 102, 241, 0.08);
      backdrop-filter: blur(16px);
      padding: 14px 16px;
    }

    .article-tooltip.visible { opacity: 1; }
    .tooltip-title { font-size: 16px; font-weight: 800; line-height: 1.35; color: #f7ffff; }
    .tooltip-source { margin-top: 5px; color: rgba(136, 136, 160, 0.9); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; }
    .tooltip-summary { margin-top: 10px; padding-left: 18px; color: rgba(228, 228, 236, 0.82); font-size: 13px; line-height: 1.55; }
    .tooltip-summary li { margin: 5px 0; }

    /* Zoom-in country label — only visible when camera is close enough */
    .country-label {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 4;
      pointer-events: none;
      text-align: center;
      opacity: 0;
      transition: opacity 320ms ease;
      will-change: transform, opacity;
    }
    .country-label.visible { opacity: 1; }
    .country-label .country-name {
      display: block;
      font-size: clamp(28px, 4.6vw, 56px);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.05;
      background: linear-gradient(135deg, #f7ffff 0%, #67e8f9 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 60px rgba(34, 211, 238, 0.25);
    }
    .country-label .country-count {
      display: block;
      margin-top: 6px;
      font-size: clamp(13px, 1.6vw, 20px);
      font-weight: 600;
      letter-spacing: 0.12em;
      color: rgba(136, 146, 182, 0.88);
      text-shadow: 0 0 30px rgba(99, 102, 241, 0.18);
    }

    .hud {
      position: absolute;
      left: clamp(20px, 5vw, 72px);
      top: clamp(24px, 6vh, 72px);
      z-index: 2;
      pointer-events: none;
      max-width: min(780px, calc(100vw - 40px));
      padding: clamp(16px, 2.6vw, 24px);
      border: 1px solid rgba(103, 232, 249, 0.12);
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(5, 11, 28, 0.50), rgba(5, 8, 20, 0.18));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 0 44px rgba(34, 211, 238, 0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      text-shadow: 0 0 24px rgba(34, 211, 238, 0.28);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--cyan);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      opacity: 0.9;
    }

    .eyebrow::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--cyan);
      box-shadow: 0 0 18px var(--cyan), 0 0 34px var(--accent);
      animation: statusPulse 1.8s ease-in-out infinite;
    }

    h1 {
      margin-top: 14px;
      font-size: clamp(20px, 4vw, 48px);
      line-height: 0.94;
      letter-spacing: -0.06em;
      max-width: 760px;
      background: linear-gradient(135deg, #fff 0%, #eef7ff 34%, #67e8f9 63%, #a78bfa 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .subline {
      margin-top: 18px;
      color: rgba(228, 228, 236, 0.68);
      font-size: clamp(13px, 1.45vw, 17px);
      max-width: 520px;
      line-height: 1.8;
    }

    .signal-metrics {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
    }

    .metric {
      min-width: 108px;
      padding: 10px 12px;
      border: 1px solid rgba(103, 232, 249, 0.14);
      border-radius: 16px;
      background: rgba(3, 9, 24, 0.42);
      box-shadow: inset 0 0 18px rgba(34, 211, 238, 0.045);
    }

    .metric strong {
      display: block;
      color: #f7ffff;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .metric span {
      display: block;
      margin-top: 2px;
      color: rgba(136, 146, 182, 0.86);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .scanline {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.12;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.0) 0px,
        rgba(255,255,255,0.0) 3px,
        rgba(34,211,238,0.22) 4px,
        rgba(255,255,255,0.0) 5px
      );
      mix-blend-mode: screen;
    }

    .vignette {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 46%, transparent 0%, transparent 38%, rgba(0,0,0,0.28) 66%, rgba(0,0,0,0.8) 100%),
        linear-gradient(90deg, rgba(0,0,0,0.62), transparent 30%, transparent 70%, rgba(0,0,0,0.62));
    }

    .hint {
      position: absolute;
      right: clamp(16px, 4vw, 52px);
      bottom: clamp(16px, 4vh, 42px);
      z-index: 2;
      color: rgba(136, 136, 160, 0.75);
      font-size: 12px;
      letter-spacing: 0.08em;
      pointer-events: none;
    }

    .scroll-hint {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 8;
      color: rgba(136, 136, 160, 0.45);
      font-size: 11px;
      letter-spacing: 0.06em;
      pointer-events: none;
      animation: scrollPulse 3s ease-in-out infinite;
    }

    @keyframes scrollPulse {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 0.7; }
    }

    @keyframes statusPulse {
      0%, 100% { transform: scale(0.84); opacity: 0.65; }
      50% { transform: scale(1.2); opacity: 1; }
    }

    @media (max-width: 768px) {
      .hud { top: 28px; left: 20px; right: 20px; }
      .subline { max-width: 330px; }
      .hint { display: none; }
      .filter-bar { border-radius: 22px; bottom: 12px; padding: 8px; }
      .filter-btn { font-size: 10px; padding: 7px 9px; }
    }
  </style>
  <!-- Timeline + Feed styles -->
  <style>
    .top-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 20;
      display: flex; align-items: center; gap: 8px;
      padding: 10px clamp(14px,3vw,28px);
      background: linear-gradient(180deg, rgba(3,6,18,0.88) 0%, rgba(3,6,18,0.72) 70%, transparent);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      pointer-events: auto;
    }
    .top-nav .logo { font-size: 18px; font-weight: 800; background: linear-gradient(135deg,#67e8f9,#a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-right: 16px; white-space: nowrap; }
    .nav-btn {
      background: transparent; border: 1px solid rgba(136,136,160,0.25); border-radius: 999px;
      color: rgba(238,247,255,0.65); cursor: pointer; font: inherit; font-size: 12px; font-weight: 600;
      padding: 6px 14px; transition: all .2s; letter-spacing: .04em;
    }
    .nav-btn:hover { border-color: rgba(34,211,238,0.5); color: #eef7ff; }
    .nav-btn.active { background: rgba(34,211,238,0.15); border-color: #22d3ee; color: #eaffff; }
    .lang-btn {
      margin-left: auto; background: transparent; border: 1px solid rgba(136,136,160,0.2); border-radius: 999px;
      color: rgba(238,247,255,0.6); cursor: pointer; font: inherit; font-size: 11px; font-weight: 600;
      padding: 5px 10px; transition: all .2s;
    }
    .lang-btn:hover { border-color: rgba(167,139,250,0.5); color: #eef7ff; }
    .lang-dropdown {
      display: none; position: absolute; top: 100%; right: 10px; margin-top: 4px;
      background: rgba(7,10,22,0.95); border: 1px solid rgba(136,136,160,0.25); border-radius: 12px;
      backdrop-filter: blur(16px); overflow: hidden; min-width: 120px;
    }
    .lang-dropdown.open { display: block; }
    .lang-option {
      display: block; width: 100%; padding: 8px 14px; border: none; background: transparent;
      color: rgba(238,247,255,0.7); cursor: pointer; font: inherit; font-size: 13px; text-align: left;
      transition: background .15s;
    }
    .lang-option:hover { background: rgba(99,102,241,0.2); color: #fff; }
    .lang-option.active { color: #67e8f9; font-weight: 600; }

    .view-panel {
      display: none; position: fixed; top: 52px; left: 0; right: 0; bottom: 0;
      overflow-y: auto; z-index: 8; padding: 24px clamp(14px,4vw,48px) 40px;
    }
    .view-panel.active { display: block; }
    #globe-view {
      top: 0; padding: 0; overflow: hidden;
    }
    #globe-view #hero {
      top: 52px;
      height: calc(100dvh - 52px);
    }

    /* Timeline */
    .timeline-year { margin-bottom: 32px; }
    .timeline-year h2 { font-size: 22px; font-weight: 700; color: #22d3ee; margin-bottom: 14px; letter-spacing: .06em; }
    .timeline-event {
      display: flex; gap: 16px; margin-bottom: 12px; padding: 14px 18px;
      background: rgba(7,10,22,0.6); border: 1px solid rgba(136,136,160,0.12); border-radius: 12px;
      transition: all .2s;
    }
    .timeline-event:hover { border-color: rgba(99,102,241,0.4); background: rgba(7,10,22,0.8); }
    .timeline-event .date { font-size: 14px; color: #8892b6; min-width: 60px; font-weight: 600; }
    .timeline-event .info { flex: 1; }
    .timeline-event .info h3 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .timeline-event .info p { font-size: 14px; color: rgba(228,228,236,0.7); }
    .timeline-event .type-badge {
      font-size: 12px; padding: 3px 10px; border-radius: 4px; font-weight: 600;
      align-self: center;
    }
    .type-badge.finance { background: rgba(34,197,94,0.15); color: #22c55e; }
    .type-badge.tech { background: rgba(59,130,246,0.15); color: #3b82f6; }
    .type-badge.politics { background: rgba(234,179,8,0.15); color: #eab308; }
    .type-badge.climate { background: rgba(249,115,22,0.15); color: #f97316; }
    .type-badge.crypto { background: rgba(99,102,241,0.15); color: #818cf8; }
    .type-badge.disaster { background: rgba(239,68,68,0.15); color: #ef4444; }

    /* Feed cards */
    .feed-grid { display: grid; grid-template-columns: 1fr; gap: 14px; max-width: 900px; margin: 0 auto; }
    @media(min-width:768px){ .feed-grid { grid-template-columns: 1fr 1fr; } }
    .feed-card {
      background: rgba(7,10,22,0.6); border: 1px solid rgba(136,136,160,0.12); border-radius: 14px;
      padding: 16px; transition: all .2s;
    }
    .feed-card:hover { border-color: rgba(99,102,241,0.35); }
    .feed-card .card-top { display: flex; justify-content: space-between; align-items: start; gap: 8px; margin-bottom: 6px; }
    .feed-card .card-topic { font-size: 12px; padding: 3px 9px; border-radius: 4px; font-weight: 600; }
    .feed-card .card-source { font-size: 12px; color: rgba(136,136,160,0.8); }
    .feed-card h3 { font-size: 16px; font-weight: 600; line-height: 1.4; margin-bottom: 8px; }
    .feed-card h3 a { color: #eef7ff; text-decoration: none; }
    .feed-card h3 a:hover { color: #67e8f9; }
    .feed-card .card-summary { font-size: 14px; color: rgba(228,228,236,0.7); line-height: 1.55; margin-bottom: 8px; }
    .feed-card .card-summary li { margin: 4px 0; }
    .feed-card .card-meta { display: flex; justify-content: space-between; font-size: 12px; color: rgba(136,136,160,0.6); border-top: 1px solid rgba(136,136,160,0.08); padding-top: 8px; }
    .bias-indicator { font-size: 12px; padding: 2px 9px; border-radius: 4px; }
    .bias-low { background: rgba(34,197,94,0.12); color: #22c55e; }
    .bias-med { background: rgba(234,179,8,0.12); color: #eab308; }
    .bias-high { background: rgba(239,68,68,0.12); color: #ef4444; }

    .breach-banner {
      position: fixed; top: 52px; left: 0; right: 0; z-index: 15;
      background: linear-gradient(90deg, rgba(239,68,68,0.15), rgba(239,68,68,0.08));
      border-bottom: 1px solid rgba(239,68,68,0.3);
      padding: 10px 20px; font-size: 15px; color: #fca5a5; text-align: center;
      backdrop-filter: blur(8px); display: none; font-weight: 600;
    }
    .breach-banner.show { display: block; }
    .breach-banner strong { color: #ef4444; }
    
    /* 3D History canvas */
    #history3d-canvas {
      position: absolute; inset: 0; width: 100%; height: 100%; display: block;
      cursor: grab; touch-action: none;
    }
    #history3d-canvas:active { cursor: grabbing; }
  </style>
</head>
<body>

<!-- Top Navigation -->
<nav class="top-nav">
  <span class="logo">◆ AstroAxis</span>
  <button class="nav-btn active" data-view="globe" data-i18n="nav.globe">Globe</button>
  <button class="nav-btn" data-view="timeline" data-i18n="nav.timeline">Timeline</button>
  <button class="nav-btn" data-view="feed" data-i18n="nav.feed">Feed</button>
  <button class="nav-btn" data-view="history3d" data-i18n="nav.history3d">3D History</button>
  <div style="position:relative;margin-left:auto">
    <button class="lang-btn" id="langBtn">🌐 繁</button>
    <div class="lang-dropdown" id="langDropdown">
      <button class="lang-option" data-lang="en">English</button>
      <button class="lang-option active" data-lang="zh-HK">繁體中文</button>
      <button class="lang-option" data-lang="zh-CN">简体中文</button>
      <button class="lang-option" data-lang="ja">日本語</button>
      <button class="lang-option" data-lang="ko">한국어</button>
    </div>
  </div>
</nav>

<!-- Breaking news banner -->
<div class="breach-banner" id="breachBanner">
  ⚠️ <strong data-i18n="alert.breaking">BREAKING:</strong> <span id="breachText">Major event detected</span>
</div>

<div id="globe-view" class="view-panel active">
  <main id="hero" aria-label="AstroAxis hologram globe hero">
    <canvas id="globe-canvas"></canvas>
    <section class="hud" aria-hidden="true">
      <div class="eyebrow" data-i18n="hud.eyebrow">LIVE SIGNAL MAP</div>
      <h1>AstroAxis</h1>
      <p class="subline" data-i18n="hud.subline">AI-powered world news aggregator</p>
    </section>
    <div id="article-tooltip" class="article-tooltip" role="status" aria-live="polite"></div>
    <div id="country-label" class="country-label"><span class="country-name" id="country-label-name"></span><span class="country-count" id="country-label-count"></span></div>
    <nav class="filter-bar" aria-label="News marker filters">
      <button class="filter-btn active" data-filter-type="all" data-filter-value="All" data-i18n="filter.all">All</button>
      <button class="filter-btn" data-filter-type="region" data-filter-value="Americas" data-i18n="filter.americas">Americas</button>
      <button class="filter-btn" data-filter-type="region" data-filter-value="Europe" data-i18n="filter.europe">Europe</button>
      <button class="filter-btn" data-filter-type="region" data-filter-value="Asia" data-i18n="filter.asia">Asia</button>
      <button class="filter-btn active" data-filter-type="time" data-filter-value="all" data-i18n="filter.alltime">ALL TIME</button>
      <button class="filter-btn" data-filter-type="time" data-filter-value="6h" data-i18n="filter.6h">6H</button>
      <button class="filter-btn" data-filter-type="time" data-filter-value="24h" data-i18n="filter.24h">24H</button>
      <button class="filter-btn" data-filter-type="topic" data-filter-value="Bitcoin" data-i18n="filter.bitcoin">Bitcoin</button>
      <button class="filter-btn" data-filter-type="topic" data-filter-value="DeFi" data-i18n="filter.defi">DeFi</button>
      <button class="filter-btn" data-filter-type="topic" data-filter-value="AI" data-i18n="filter.ai">AI</button>
      <button class="filter-btn" data-filter-type="topic" data-filter-value="Regulation" data-i18n="filter.regulation">Regulation</button>
    </nav>
    <div class="scanline"></div>
    <div class="vignette"></div>
    <div class="hint" data-i18n="hint.drag">DRAG TO ROTATE · CLICK MARKERS FOR FULL STORY</div>
    <div class="scroll-hint" aria-hidden="true" data-i18n="hint.scroll">↓ scroll for articles</div>
  </main>

  <script>
    // ── View switching ──

    const timelineData = {"2026": [{"date": "2026-06-27", "title": "Binance EU Exit", "desc": "Binance fails MiCA license, withdraws from EU market", "type": "crypto"}, {"date": "2026-06-24", "title": "Venezuela Earthquake", "desc": "Dual 7.5M earthquakes, 1400+ casualties", "type": "disaster"}, {"date": "2026-04-05", "title": "Iran-US Peace Deal", "desc": "Historic ceasefire signed between US and Iran", "type": "politics"}, {"date": "2026-02-10", "title": "AI Model Proliferation", "desc": "Multiple nations launch sovereign AI models", "type": "tech"}], "2025": [{"date": "2025-09-01", "title": "Crypto Market Correction", "desc": "Bitcoin drops 40% from ATH, broad selloff", "type": "crypto"}, {"date": "2025-06-15", "title": "USMCA Renegotiation", "desc": "North American trade deal renegotiation begins", "type": "finance"}, {"date": "2025-03-28", "title": "AI Export Controls", "desc": "US expands AI chip export restrictions", "type": "tech"}, {"date": "2025-01-20", "title": "New US Administration", "desc": "Inauguration of 47th US President", "type": "politics"}], "2024": [{"date": "2024-11-05", "title": "US Presidential Election", "desc": "2024 United States presidential election", "type": "politics"}, {"date": "2024-07-21", "title": "Global Heatwave Record", "desc": "Hottest day on record globally", "type": "climate"}, {"date": "2024-03-15", "title": "EU AI Act Passed", "desc": "European Parliament passes landmark AI regulation", "type": "tech"}, {"date": "2024-01-10", "title": "Bitcoin ETF Approved", "desc": "SEC approves first spot Bitcoin ETFs", "type": "finance"}], "2023": [{"date": "2023-10-07", "title": "Israel-Gaza War", "desc": "Hamas attack triggers major conflict", "type": "politics"}, {"date": "2023-07-19", "title": "Global Temperature Record", "desc": "Hottest month ever recorded globally", "type": "climate"}, {"date": "2023-05-06", "title": "King Charles Coronation", "desc": "Charles III crowned King of the United Kingdom", "type": "politics"}, {"date": "2023-03-14", "title": "GPT-4 Released", "desc": "OpenAI releases GPT-4, advancing AI capabilities", "type": "tech"}], "2022": [{"date": "2022-11-30", "title": "ChatGPT Launched", "desc": "OpenAI releases ChatGPT, sparking AI revolution", "type": "tech"}, {"date": "2022-09-08", "title": "Queen Elizabeth II Dies", "desc": "Longest-reigning British monarch dies at 96", "type": "politics"}, {"date": "2022-02-24", "title": "Russia Invades Ukraine", "desc": "Full-scale invasion begins, major European conflict", "type": "politics"}, {"date": "2022-01-05", "title": "Bitcoin Crashes", "desc": "Bitcoin drops 50% from Nov 2021 high of $69K", "type": "crypto"}]};

      },
    };
    const LANG_LABELS = {en:'EN','zh-HK':'繁','zh-CN':'简','ja':'日','ko':'한'};

    function applyLanguage() {
      const t = I18N[currentLang] || I18N['zh-HK'];
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (t[key]) el.textContent = t[key];
      });
      document.getElementById('langBtn').textContent = '🌐 ' + (LANG_LABELS[currentLang] || '繁');
      renderTimeline();
      renderFeed();
    }

    document.getElementById('langBtn').addEventListener('click', () => {
      document.getElementById('langDropdown').classList.toggle('open');
    });
    document.querySelectorAll('.lang-option').forEach(opt => {
      opt.addEventListener('click', () => {
        currentLang = opt.dataset.lang;
        localStorage.setItem('astrolang', currentLang);
        document.querySelectorAll('.lang-option').forEach(o => o.classList.remove('active'));
        opt.classList.add('active');
        document.getElementById('langDropdown').classList.remove('open');
        applyLanguage();
      });
    });

    // Defer initial language/render pass until all const data below (TL_TYPE, NEWS_DATA)
    // has been initialized. Calling applyLanguage() here triggers temporal-dead-zone
    // ReferenceErrors and aborts the rest of the script before the globe can start.

    // ── Timeline ──
    // TL_LABELS merged into I18N above
    const TL_TYPE = {en:{finance:'Finance',tech:'Tech',politics:'Politics',climate:'Climate',crypto:'Crypto',disaster:'Disaster'},'zh-HK':{finance:'金融',tech:'科技',politics:'政治',climate:'氣候',crypto:'加密貨幣',disaster:'災難'},'zh-CN':{finance:'金融',tech:'科技',politics:'政治',climate:'气候',crypto:'加密货币',disaster:'灾难'},ja:{finance:'金融',tech:'技術',politics:'政治',climate:'気候',crypto:'暗号資産',disaster:'災害'},ko:{finance:'금융',tech:'기술',politics:'정치',climate:'기후',crypto:'암호화폐',disaster:'재난'}};

    function renderTimeline() {
      const t = I18N[currentLang] || I18N['zh-HK'];
      const types = TL_TYPE[currentLang] || TL_TYPE['en'];
      let html = `<h2 style="font-size:24px;font-weight:700;margin-bottom:24px;background:linear-gradient(135deg,#67e8f9,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent">${t['tl.title']}</h2>`;
      Object.keys(timelineData).sort().reverse().forEach(year => {
        html += `<div class="timeline-year"><h2>${year}</h2>`;
        timelineData[year].forEach(ev => {
          html += `<div class="timeline-event">
            <div class="date">${ev.date}</div>
            <div class="info"><h3>${ev.title}</h3><p>${ev.desc}</p></div>
            <span class="type-badge ${ev.type}">${types[ev.type] || ev.type}</span>
          </div>`;
        });
        html += `</div>`;
      });
      document.getElementById('timeline-content').innerHTML = html;
    }

    // ── Feed ──
    function renderFeed() {
      const articles = NEWS_DATA.articles || [];
      if (!articles.length) { document.getElementById('feed-content').innerHTML = '<p style="color:rgba(136,136,160,0.7);text-align:center;padding:40px">No articles yet.</p>'; return; }
      let html = `<h2 style="font-size:24px;font-weight:700;margin-bottom:20px;background:linear-gradient(135deg,#67e8f9,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent">${I18N[currentLang]?.['feed.title'] || 'AstroAxis Feed'}</h2><div class="feed-grid">`;
      articles.slice(0, 50).forEach(a => {
        const biasScore = a.bias_score || 0;
        const biasCls = biasScore === 0 ? 'bias-low' : biasScore < 3 ? 'bias-med' : 'bias-high';
        const t = I18N[currentLang] || I18N['zh-HK']; const biasLabel = biasScore === 0 ? t['bias.none'] : biasScore < 3 ? t['bias.light'] : t['bias.high'];
        // Multi-language summary: prefer currentLang, fallback zh-HK, fallback ai_summary string
        const summaryText = (a.summaries && a.summaries[currentLang]) || (a.summaries && a.summaries['zh-HK']) || a.ai_summary || '';
        const bullets = summaryText.split('\\n').filter(l => l.includes('•')).map(l => l.replace(/^[•\\s]+/,'').trim()).filter(Boolean).slice(0, 4);
        html += `<div class="feed-card">
          <div class="card-top">
            <span class="card-topic" style="color:#${a.topic === 'AI' ? '3b82f6' : a.topic === 'Bitcoin' ? 'f97316' : a.topic === 'Regulation' ? 'ef4444' : a.topic === 'DeFi' ? '22c55e' : '818cf8'}">${a.topic || 'General'}</span>
            <span class="bias-indicator ${biasCls}">${biasLabel}</span>
          </div>
          <h3><a href="${a.url}" target="_blank" rel="noopener">${a.title}</a></h3>
          <div class="card-summary"><ul>${bullets.map(b => `<li>${b}</li>`).join('')}</ul></div>
          <div class="card-meta">
            <span>${a.source}</span>
            <span>${a.published ? new Date(a.published).toLocaleDateString() : ''}</span>
          </div>
        </div>`;
      });
      html += '</div>';
      document.getElementById('feed-content').innerHTML = html;
    }

    // ── Breaking news checker ──
    async function checkBreaking() {
      try {
        const articles = NEWS_DATA.articles || [];
        const recent = articles.filter(a => {
          if (!a.published) return false;
          const h = (Date.now() - new Date(a.published).getTime()) / 3600000;
          return h < 2;
        });
        const urgent = recent.filter(a => /earthquake|tsunami|hurricane|attack|war|crash|collapse|explosion|shooting|pandemic/i.test((a.title||'') + ' ' + (a.ai_summary||'')));
        const banner = document.getElementById('breachBanner');
        if (urgent.length > 0) {
          document.getElementById('breachText').textContent = urgent[0].title.slice(0, 80);
          banner.classList.add('show');
        } else {
          banner.classList.remove('show');
        }
      } catch(e) { console.warn('Breaking check:', e); }
    }

    // ── 3D History Timeline ──
    let history3D = null;

    function initHistory3D() {
      if (history3D) {
        if (history3D.resize) history3D.resize();
        if (!history3D.animId && history3D.animate) history3D.animate();
        return;
      }

      const canvas = document.getElementById('history3d-canvas');
      if (!canvas || !window.THREE) return;

      const RECENT_YEARS = [2026, 2025, 2024, 2023, 2022];
      const yearSet = new Set(RECENT_YEARS);
      const eventsByYear = {};
      RECENT_YEARS.forEach(year => { eventsByYear[year] = []; });

      Object.keys(timelineData || {}).forEach(yearKey => {
        const year = parseInt(yearKey, 10);
        if (!yearSet.has(year)) return;
        (timelineData[yearKey] || []).forEach((ev, index) => {
          eventsByYear[year].push({ ...ev, year, _index: index });
        });
      });

      const events = RECENT_YEARS.flatMap(year => eventsByYear[year]);
      if (!events.length) return;

      const hudLabel = document.getElementById('history3d-year-label');
      if (hudLabel) {
        hudLabel.textContent = `CENTER 2026 · OUTER RINGS 2025 → 2022 · ${events.length} EVENTS`;
      }

      const root = canvas.parentElement || canvas;
      const getSize = () => ({
        w: root.clientWidth || window.innerWidth,
        h: root.clientHeight || window.innerHeight
      });
      const initialSize = getSize();

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x03040c);
      scene.fog = new THREE.FogExp2(0x03040c, 0.035);

      const camera = new THREE.PerspectiveCamera(48, initialSize.w / initialSize.h, 0.1, 80);
      camera.position.set(0, initialSize.w < 760 ? 8.8 : 9.8, initialSize.w < 760 ? 11.5 : 10.4);

      const renderer = new THREE.WebGLRenderer({
        canvas,
        antialias: true,
        alpha: false,
        powerPreference: 'high-performance'
      });
      renderer.setClearColor(0x03040c, 1);
      renderer.setSize(initialSize.w, initialSize.h);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.5));

      const clock = new THREE.Clock();
      const universe = new THREE.Group();
      universe.rotation.y = -0.22;
      scene.add(universe);

      scene.add(new THREE.AmbientLight(0x7c8cff, 0.35));
      const keyLight = new THREE.DirectionalLight(0xffffff, 1.05);
      keyLight.position.set(4, 8, 5);
      scene.add(keyLight);
      const cyanLight = new THREE.PointLight(0x22d3ee, 1.2, 16);
      cyanLight.position.set(0, 3.5, 0);
      scene.add(cyanLight);

      const typeOrder = ['politics', 'tech', 'finance', 'disaster', 'climate', 'crypto', 'science', 'sports', 'general'];
      const typeColors = {
        politics: '#eab308',
        tech: '#3b82f6',
        finance: '#22c55e',
        disaster: '#ef4444',
        climate: '#f97316',
        crypto: '#818cf8',
        science: '#a78bfa',
        sports: '#f59e0b',
        general: '#8892b6'
      };
      const yearAccent = ['#67e8f9', '#22d3ee', '#818cf8', '#a78bfa', '#6366f1'];
      const typeLabelMap = TL_TYPE[currentLang] || TL_TYPE.en || {};
      const TAU = Math.PI * 2;
      const sectorSpan = TAU / typeOrder.length;
      const innerRadius = 0.78;
      const ringStep = 1.34;
      const outerRadius = innerRadius + ringStep * (RECENT_YEARS.length - 1);

      function safeText(value) {
        return String(value || '').replace(/[&<>"']/g, ch => ({
          '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[ch]));
      }

      function drawRoundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
      }

      function makeTextSprite(text, opts = {}) {
        const width = opts.width || 640;
        const height = opts.height || 160;
        const canvasLabel = document.createElement('canvas');
        canvasLabel.width = width;
        canvasLabel.height = height;
        const ctx = canvasLabel.getContext('2d');
        ctx.clearRect(0, 0, width, height);
        if (opts.bg) {
          drawRoundRect(ctx, 10, 10, width - 20, height - 20, opts.radius || 28);
          ctx.fillStyle = opts.bg;
          ctx.fill();
          ctx.strokeStyle = opts.border || 'rgba(103,232,249,0.25)';
          ctx.lineWidth = 3;
          ctx.stroke();
        }
        ctx.font = `${opts.weight || 700} ${opts.size || 46}px Inter, Arial, sans-serif`;
        ctx.textAlign = opts.align || 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = opts.shadow || opts.color || '#67e8f9';
        ctx.shadowBlur = opts.shadowBlur == null ? 14 : opts.shadowBlur;
        ctx.fillStyle = opts.color || '#eaffff';
        const maxWidth = width - 54;
        const label = String(text || '');
        const metrics = ctx.measureText(label);
        let display = label;
        if (metrics.width > maxWidth) {
          while (display.length > 4 && ctx.measureText(display + '…').width > maxWidth) display = display.slice(0, -1);
          display += '…';
        }
        ctx.fillText(display, opts.align === 'left' ? 32 : width / 2, height / 2 + (opts.yOffset || 0));
        const texture = new THREE.CanvasTexture(canvasLabel);
        texture.minFilter = THREE.LinearFilter;
        texture.magFilter = THREE.LinearFilter;
        texture.generateMipmaps = false;
        const material = new THREE.SpriteMaterial({
          map: texture,
          transparent: true,
          opacity: opts.opacity == null ? 0.92 : opts.opacity,
          depthWrite: false,
          depthTest: opts.depthTest == null ? false : opts.depthTest
        });
        const sprite = new THREE.Sprite(material);
        sprite.scale.set(opts.scaleX || 1.65, opts.scaleY || 0.42, 1);
        sprite.userData.texture = texture;
        return sprite;
      }

      function circlePoint(radius, angle, y = 0) {
        return new THREE.Vector3(Math.cos(angle) * radius, y, Math.sin(angle) * radius);
      }

      const ringGroup = new THREE.Group();
      const markerGroup = new THREE.Group();
      const labelGroup = new THREE.Group();
      const connectorGroup = new THREE.Group();
      universe.add(ringGroup, connectorGroup, markerGroup, labelGroup);

      // Soft star field behind the orbital history map.
      const starCount = initialSize.w < 760 ? 90 : 150;
      const starPositions = new Float32Array(starCount * 3);
      for (let i = 0; i < starCount; i++) {
        const angle = Math.random() * TAU;
        const radius = 9 + Math.random() * 18;
        starPositions[i * 3] = Math.cos(angle) * radius;
        starPositions[i * 3 + 1] = -2.8 + Math.random() * 11;
        starPositions[i * 3 + 2] = Math.sin(angle) * radius;
      }
      const stars = new THREE.Points(
        new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(starPositions, 3)),
        new THREE.PointsMaterial({ color: 0x8fbfff, size: 0.035, transparent: true, opacity: 0.55, depthWrite: false })
      );
      scene.add(stars);

      // Center = 2026, then each older year expands outward as a concentric ring.
      RECENT_YEARS.forEach((year, yearIndex) => {
        const radius = innerRadius + yearIndex * ringStep;
        const color = new THREE.Color(yearAccent[yearIndex] || '#67e8f9');
        const ringMaterial = new THREE.MeshBasicMaterial({
          color,
          transparent: true,
          opacity: yearIndex === 0 ? 0.75 : 0.45,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
          side: THREE.DoubleSide
        });
        const ring = new THREE.Mesh(new THREE.RingGeometry(radius - 0.022, radius + 0.022, 224, 3), ringMaterial);
        ring.rotation.x = -Math.PI / 2;
        ring.userData = { year, radius, baseOpacity: ringMaterial.opacity };
        ringGroup.add(ring);

        const haloMaterial = new THREE.MeshBasicMaterial({
          color,
          transparent: true,
          opacity: yearIndex === 0 ? 0.08 : 0.045,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
          side: THREE.DoubleSide
        });

ents could lead to a sharp reduction in funding for technology firms, potentially harming the global economy.\n• The report noted that current optimism around AI may be excessive, and if actual returns fall short, investors might quickly withdraw capital.\n• Such a pullback could trigger a prolonged investment slump in the tech sector.", "zh-CN": "• 国际清算银行(BIS)警告，若人工智能领域投资回报表现疲弱，可能导致科技企业融资大幅减少，进而对全球经济产生负面影响。\n• 报告指出，目前市场对AI的乐观情绪可能过高，一旦实际回报不如预期，投资者或会迅速撤资。\n• 此举可能引发投资周期性低迷，延长科技行业的资金紧缩时期。", "ja": "• 国際決済銀行（BIS）は、AI投資の収益が弱い場合、テクノロジー企業への資金提供が大幅に減少し、世界経済に悪影響を及ぼす可能性があると警告した。\n• 報告書は、現在のAIに対する楽観的な見方が過剰であり、実際の収益が期待を下回れば、投資家が急速に資本を引き揚げる可能性があると指摘。\n•"}}, {"url": "https://www.bloomberg.com/news/articles/2026-06-28/ai-bust-risks-ripple-effects-from-growth-to-credit-bis-says", "title": "AI Bust Risks Ripple Effects From Growth to Credit, BIS Says", "source": "Bloomberg Crypto", "topic": "Policy", "category": "finance", "published": "2026-06-28T09:00:00+00:00", "ai_summary": "• 國際清算銀行", "summaries": {"bias": "The original uses the emotional term \"alarming\" to describe threats; rewritten to neutral \"significant risks.\"", "zh-HK": "• 國際清算銀行"}}, {"url": "https://www.wired.com/story/china-defies-us-restrictions-and-builds-the-worlds-fastest-supercomputer/", "title": "China Defies US Restrictions and Builds the World’s Fastest Supercomputer", "source": "Wired", "topic": "DeFi", "category": "tech", "published": "2026-06-28T09:00:00+00:00", "ai_summary": "• 中國國家超級計算深圳中心安裝的「LineShine」超級電腦，在TOP500排名中超越美國的「El Capitan」，成為全球運算速度最快的系統。\n• LineShine不使用圖形處理器（GPU），純粹依賴中央處理器（CPU），搭載約45,000顆LX2處理器，每顆有304個核心，時脈1.55 GHz。\n• 該系統完全採用中國自主研發的硬體與軟體，包括基於Linux的麒麟作業系統，以及高速網絡「靈渠」連接所有節點。\n• LineShine的運算能力達2,198 exafl", "summaries": {"bias": "Original uses loaded language such as \"defies,\" \"clear message,\" and \"thrive despite lacking access,\" implying a confrontational narrative; rewritten to neutral factual statements.", "zh-HK": "• 中國國家超級計算深圳中心安裝的「LineShine」超級電腦，在TOP500排名中超越美國的「El Capitan」，成為全球運算速度最           vWorld = world.xyz;
          gl_Position = projectionMatrix * viewMatrix * world;

    const continentMaterial = new THREE.ShaderMaterial({

        uColorA: { value: CYAN },
        uColorB: { value: ACCENT }

        attribute float aProgress;
        varying float vProgress;
        varying vec3 vWorld;
        void main() {
          vProgress = aProgress;
          vec4 world = modelMatrix * vec4(position, 1.0);
          vWorld = world.xyz;
          gl_Position = projectionMatrix * viewMatrix * world;
        }

      fragmentShader: `
        uniform float uTime;
        uniform float uOpacity;
        uniform vec3 uColorA;
        uniform vec3 uColorB;
        varying float vProgress;
        varying vec3 vWorld;

          float spark = smoothstep(0.975, 1.0, 1.0 - abs(fract(vProgress * 7.0 - uTime * 0.18) - 0.5) * 2.0);
          vec3 color = mix(uColorB, uColorA, 0.72 + flow * 0.28);

    // generating Three.js line geometry so we keep recognizable continents with
    // far fewer overlapping neon segments.
    const COASTLINE_SIMPLIFY_TOLERANCE = 0.5; // degrees; ~55km at equator
    const LAND_TEXTURE_SIMPLIFY_TOLERANCE = 0.25;

    function unwrapRing(ring) {
      if (!ring || !ring.length) return [];
      const unwrapped = [[ring[0][0], ring[0][1]]];
      let previous = ring[0][0];
      let offset = 0;
      for (let i = 1; i < ring.length; i++) {
        const [rawLon, lat] = ring[i];
        let lon = rawLon + offset;
        while (lon - previous > 180) lon -= 360;
        while (lon - previous < -180) lon += 360;
        offset = lon - rawLon;
        unwrapped.push([lon, lat]);
        previous = lon;
      }
      return unwrapped;
    }

    function sqSegmentDistance(point, start, end) {
      const x = point[0], y = point[1];
      const x1 = start[0], y1 = start[1];
      const dx = end[0] - x1;
      const dy = end[1] - y1;
      if (dx === 0 && dy === 0) {
        const sx = x - x1;
        const sy = y - y1;
        return sx * sx + sy * sy;
      }
      const t = Math.max(0, Math.min(1, ((x - x1) * dx + (y - y1) * dy) / (dx * dx + dy * dy)));
      const px = x1 + t * dx;
      const py = y1 + t * dy;
      const ex = x - px;
      const ey = y - py;
      return ex * ex + ey * ey;
    }

    function simplifyLineRdp(points, tolerance) {
      if (!points || points.length <= 2) return points ? points.slice() : [];
      const toleranceSq = tolerance * tolerance;
      const keep = new Uint8Array(points.length);
      keep[0] = 1;
      keep[points.length - 1] = 1;
      const stack = [[0, points.length - 1]];

      while (stack.length) {
        const [first, last] = stack.pop();
        let maxDistanceSq = 0;
        let index = -1;
        for (let i = first + 1; i < last; i++) {
          const distanceSq = sqSegmentDistance(points[i], points[first], points[last]);
          if (distanceSq > maxDistanceSq) {
            maxDistanceSq = distanceSq;
            index = i;
          }
        }
        if (index !== -1 && maxDistanceSq > toleranceSq) {
          keep[index] = 1;
          stack.push([first, index], [index, last]);
        }
      }

      const simplified = [];
      for (let i = 0; i < points.length; i++) {
        if (keep[i]) simplified.push(points[i]);
      }
      return simplified;
    }

    function simplifyRing(ring, tolerance = COASTLINE_SIMPLIFY_TOLERANCE) {
      const unwrapped = unwrapRing(ring);
      if (unwrapped.length <= 4) return unwrapped;

      const points = unwrapped.slice();
      const first = points[0];
      const last = points[points.length - 1];
      if (Math.abs(first[0] - last[0]) < 1e-9 && Math.abs(first[1] - last[1]) < 1e-9) {
        points.pop();
      }
      if (points.length <= 4) return points;

      // RDP is defined for open polylines. For a closed coast ring, split it at
      // the point farthest from the first vertex, simplify both arcs, then join.
      let splitIndex = 1;
      let maxDistanceSq = 0;
      for (let i = 1; i < points.length; i++) {
        const dx = points[i][0] - points[0][0];
        const dy = points[i][1] - points[0][1];
        const distanceSq = dx * dx + dy * dy;
        if (distanceSq > maxDistanceSq) {
          maxDistanceSq = distanceSq;
          splitIndex = i;
        }
      }

      const arcA = simplifyLineRdp(points.slice(0, splitIndex + 1), tolerance);
      const arcB = simplifyLineRdp(points.slice(splitIndex).concat([points[0]]), tolerance);
      const simplified = arcA.concat(arcB.slice(1, -1));

      // Never let simplification collapse an island/continent into a triangle.
      return simplified.length >= 4 ? simplified : points;
    }

    function lonLatToTexturePoint(lon, lat, xShift = 0) {
      return [
        ((lon + 180) / 360) * landCanvas.width + xShift,
        ((90 - lat) / 180) * landCanvas.height

    function drawLandTexture(geoJson) {
      landCtx.clearRect(0, 0, landCanvas.width, landCanvas.height);

      landCtx.strokeStyle = 'rgba(34, 211, 238, 0.18)';

      function drawPolygon(poly, xShift) {
        landCtx.beginPath();
        poly.forEach((ring) => {
          const simplified = simplifyRing(ring, LAND_TEXTURE_SIMPLIFY_TOLERANCE);
          simplified.forEach(([lon, lat], i) => {
            const [x, y] = lonLatToTexturePoint(lon, lat, xShift);
            if (i === 0) landCtx.moveTo(x, y);
            else landCtx.lineTo(x, y);
          });
          landCtx.closePath();
        });
        landCtx.fill('evenodd');
        landCtx.stroke();

        if (!feature.geometry) return;
        const polygons = feature.geometry.type === 'Polygon'
          ? [feature.geometry.coordinates]
          : feature.geometry.coordinates;
        [-landCanvas.width, 0, landCanvas.width].forEach(shift => {
          polygons.forEach(poly => drawPolygon(poly, shift));

      landCtx.restore();
      landTexture.needsUpdate = true;

    function ringAreaApprox(ring) {

      }
      return Math.abs(area) * 0.5;
    }

      if (ring.length < 6 || ringAreaApprox(ring) < MIN_OUTLINE_AREA) return;

      if (simplifiedRing.length < 4) return;

      const glowRadius = R * 1.022;
      const closedRing = simplifiedRing.concat([simplifiedRing[0]]);

      const glowPoints = closedRing.map(([lon, lat]) => latLonToVec3(lat, lon, glowRadius));
      const progress = new Float32Array(outlinePoints.length);
      for (let i = 0; i < outlinePoints.length; i++) progress[i] = i / Math.max(1, outlinePoints.length - 1) + index * 0.031;

      const outlineGeometry = new THREE.BufferGeometry().setFromPoints(outlinePoints);
      outlineGeometry.setAttribute('aProgress', new THREE.BufferAttribute(progress, 1));
      const glowGeometry = new THREE.BufferGeometry().setFromPoints(glowPoints);
      glowGeometry.setAttribute('aProgress', new THREE.BufferAttribute(progress, 1));

      const glowLine = new THREE.Line(glowGeometry, continentGlowMaterial);
      glowLine.renderOrder = 3;
      continentGroup.add(glowLine);

      const crispLine = new THREE.Line(outlineGeometry, continentMaterial);
      crispLine.renderOrder = 4;
      continentGroup.add(crispLine);
    }

    function pointInRing(lon, lat, ring) {
      let inside = false;
      for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
        const xi = ring[i][0], yi = ring[i][1];
        const xj = ring[j][0], yj = ring[j][1];
        if ((yi > lat) !== (yj > lat) && lon < ((xj - xi) * (lat - yi)) / (yj - yi) + xi) inside = !inside;
      }
      return inside;

    function findCountry(lon, lat) {

        let found = false;
        for (const poly of entry.polys) {
          if (!pointInRing(lon, lat, poly[0])) continue;
          let inHole = false;
          for (let k = 1; k < poly.length; k++) { if (pointInRing(lon, lat, poly[k])) { inHole = true; break; } }
          if (!inHole) { found = true; break; }
        }
        if (found) return entry;
      }
      return null;
    }

    async function loadCountries() {

        countries.features.forEach(f => {
          if (!f.properties || !f.properties.name) return;
          const polys = f.geometry.type === 'Polygon' ? [f.geometry.coordinates] : f.geometry.coordinates;

          polys.forEach(poly => poly[0].forEach(([lon, lat]) => {
            sumLon += lon; sumLat += lat; cnt++;
            if (lon < minLon) minLon = lon;
            if (lon > maxLon) maxLon = lon;
            if (lat < minLat) minLat = lat;
            if (lat > maxLat) maxLat = lat;
          }));
          countryLookup.push({
            name: f.properties.name,
            centroid: [sumLon / cnt, sumLat / cnt],
            polys,
            bbox: [minLon, minLat, maxLon, maxLat],
            count: 0
          });
        });
        // Assign articles to countries (with bbox pre-filter)
        for (let i = 0; i < count; i++) {
          const pos = markerPositions[i];
          if (!pos) continue;
          const nx = pos.x / (R * 1.035), ny = pos.y / (R * 1.035), nz = pos.z / (R * 1.035);
          const lat = 90 - THREE.MathUtils.radToDeg(Math.acos(Math.min(1, Math.max(-1, ny))));
          const lon = THREE.MathUtils.radToDeg(Math.atan2(nz, -nx)) - 180;
          const country = findCountry(lon, lat);
          if (country) country.count++;
        }
        console.log(`Loaded ${countryLookup.length} countries, ${markerPositions.length} articles mapped`);
        // Render borders + labels AFTER data is loaded (async fix)
        renderCountryBorders();
      } catch (e) { console.warn('Country labels unavailable:', e); }
    }
    loadCountries();

    // ── Render country boundary lines (called from loadCountries after data ready) ──
    function renderCountryBorders() {
      const borderGroup = new THREE.Group();
      const borderMat = new THREE.LineBasicMaterial({
        color: 0xffffff, transparent: true, opacity: 0.5, depthWrite: false, depthTest: false
      });
      const borderGlowMat = new THREE.LineBasicMaterial({
        color: 0x22d3ee, transparent: true, opacity: 0.2, depthWrite: false, depthTest: false
      });
      countryLookup.forEach(entry => {
        entry.polys.forEach(poly => {
          const ring = poly[0];
          if (!ring || ring.length < 4) return;
          const pts = ring.map(([lon, lat]) => latLonToVec3(lat, lon, R * 1.025));
          pts.push(pts[0]);
          const geom = new THREE.BufferGeometry().setFromPoints(pts);
          const line = new THREE.Line(geom, borderMat);
          borderGroup.add(line);
          const glowPts = ring.map(([lon, lat]) => latLonToVec3(lat, lon, R * 1.018));
          glowPts.push(glowPts[0]);
          const glowGeom = new THREE.BufferGeometry().setFromPoints(glowPts);
          const glowLine = new THREE.Line(glowGeom, borderGlowMat);
          borderGroup.add(glowLine);
        });
      });
      globe.add(borderGroup);
      // ── Country name sprites on globe surface ──
      const labelGroup = new THREE.Group();
      countryLookup.forEach(entry => {
        const [lon, lat] = entry.centroid;
        const pos = latLonToVec3(lat, lon, R * 1.045);
        // Create fresh canvas per country to avoid texture cross-contamination
        const c = document.createElement('canvas');
        c.width = 512; c.height = 128;
        const cx = c.getContext('2d');
        // Calculate label size from country bounding box area
        const area = (entry.bbox[2] - entry.bbox[0]) * (entry.bbox[3] - entry.bbox[1]);
        const scaleFactor = Math.sqrt(Math.abs(area)) / 6; // normalize
        const labelScale = Math.min(2.5, Math.max(0.4, scaleFactor));
        const fontSize = Math.round(28 + 28 * Math.min(1, scaleFactor));
        cx.font = `bold ${fontSize}px Inter, sans-serif`;
        cx.textAlign = 'center';
        cx.textBaseline = 'middle';
        cx.shadowColor = 'rgba(0,0,0,0.8)';
        cx.shadowBlur = 14;
        cx.fillStyle = '#f0fcff';
        cx.fillText(entry.name, 256, 64);
        cx.shadowBlur = 0;
        const tex = new THREE.CanvasTexture(c);
        tex.minFilter = THREE.LinearFilter;
        const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 0, depthWrite: false, depthTest: false });
        const sprite = new THREE.Sprite(mat);
        sprite.position.copy(pos);
        sprite.scale.set(labelScale * 1.6, labelScale * 0.4, 1);
        sprite.userData.entry = entry;
        sprite.userData.baseScale = labelScale * 1.6;
        labelGroup.add(sprite);
      });
      globe.add(labelGroup);
      // Store label group for opacity animation in animate loop
      window._countryLabels = labelGroup;
      console.log(`Rendered ${countryLookup.length} country boundaries + labels`);
    }
    // renderCountryBorders() called from loadCountries() after async fetch completes

    // Share single uTime across all shader materials
    const _uTime = { value: 0 };
    haloMaterial.uniforms.uTime = _uTime;
    continentMaterial.uniforms.uTime = _uTime;
    continentGlowMaterial.uniforms.uTime = _uTime;
    ringMat.uniforms.uTime = _uTime;
    ringParticleMat.uniforms.uTime = _uTime;
    starMaterial.uniforms.uTime = _uTime;

    // Track invisible instances for filtering
    const invisibleFlags = new Uint8Array(count);

    const tooltip = document.getElementById('article-tooltip');
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2(-10, -10);
    let hoveredIdx = -1;
    let hoveredData = null;
    let activeFilters = { time: 'all', region: 'All', topic: 'All' };

    function markerMatchesFilter(data) {
      if (activeFilters.region !== 'All' && data.region !== activeFilters.region) return false;
      if (activeFilters.topic !== 'All' && data.topic !== activeFilters.topic) return false;
      if (activeFilters.time !== 'all') {
        const published = data.article.published;
        if (!published) return false;
        const pubTime = Date.parse(published);
        if (isNaN(pubTime)) return false;
        const hoursAgo = (Date.now() - pubTime) / (1000 * 60 * 60);
        if (activeFilters.time === '6h' && hoursAgo > 6) return false;
        if (activeFilters.time === '24h' && hoursAgo > 24) return false;
      }
      return true;
    }

    function applyFilter() {
      for (let i = 0; i < count; i++) {
        const visible = markerMatchesFilter(markerData[i]);
        invisibleFlags[i] = visible ? 0 : 1;
      }
      instancedMarkers.count = count;
      instancedGlows.count = count;
      if (hoveredData && !markerMatchesFilter(hoveredData)) {
        hoveredIdx = -1;
        hoveredData = null;
        tooltip.classList.remove('visible');
      }
    }

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
    }

    let hoverCooldown = null;

    function updatePointer(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    }

    renderer.domElement.addEventListener('pointermove', event => {
      updatePointer(event);
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObject(instancedMarkers);
      if (hits.length && hits[0].instanceId !== undefined) {
        const idx = hits[0].instanceId;
        if (invisibleFlags[idx]) return;
        const data = markerData[idx];
        if (data !== hoveredData) {
          hoveredIdx = idx;
          hoveredData = data;
          const art = data.article;
          const bullets = summaryBullets(art.ai_summary);
          tooltip.innerHTML = `<div class="tooltip-title">${escapeHtml(art.title)}</div>
            <div class="tooltip-source">${escapeHtml(art.source)} · ${escapeHtml(data.city)} · ${escapeHtml(data.topic)}</div>
            <ul class="tooltip-summary">${bullets.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>`;
          tooltip.style.transition = 'none';
          // Position tooltip using instanced mesh position
          const dummy = new THREE.Object3D();
          instancedMarkers.getMatrixAt(idx, dummy.matrix);
          dummy.matrix.decompose(dummy.position, dummy.quaternion, dummy.scale);
          const world = dummy.position.clone().project(camera);
          const tx = (world.x * 0.5 + 0.5) * window.innerWidth;
          const ty = (-world.y * 0.5 + 0.5) * window.innerHeight;
          tooltip.style.transform = `translate3d(${Math.min(tx + 18, window.innerWidth - 354)}px, ${Math.max(ty - 80, 14)}px, 0) scale(1)`;
          tooltip.offsetHeight;
          tooltip.style.transition = '';
          tooltip.classList.add('visible');
        }
      } else if (hoveredData) {
        hoveredIdx = -1;
        hoveredData = null;
        tooltip.classList.remove('visible');
      }
    }, { passive: true });

    renderer.domElement.addEventListener('pointerleave', () => {
      pointer.set(-10, -10);
      if (hoveredData) { hoveredIdx = -1; hoveredData = null; tooltip.classList.remove('visible'); }
    }, { passive: true });

    renderer.domElement.addEventListener('click', () => {
      if (hoveredData && hoveredData.article.url) {
        window.open(hoveredData.article.url, '_blank', 'noopener,noreferrer');
      }
    });

    document.querySelectorAll('.filter-btn').forEach(button => {
      button.addEventListener('click', () => {
        const filterType = button.dataset.filterType;
        const filterValue = button.dataset.filterValue;

        if (filterType === 'all') {
          // Global reset: deactivate all, re-activate "All" + "ALL TIME"
          activeFilters = { time: 'all', region: 'All', topic: 'All' };
          document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
          document.querySelectorAll('.filter-btn[data-filter-type="all"]').forEach(btn => btn.classList.add('active'));
          document.querySelector('.filter-btn[data-filter-type="time"][data-filter-value="all"]').classList.add('active');
        } else if (filterType === 'region') {
          if (activeFilters.region === filterValue) {
            activeFilters.region = 'All';
            button.classList.remove('active');
            document.querySelector('.filter-btn[data-filter-type="all"]').classList.add('active');
          } else {
            activeFilters.region = filterValue;
            document.querySelectorAll('.filter-btn[data-filter-type="all"]').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.filter-btn[data-filter-type="region"]').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
          }
        } else if (filterType === 'time') {
          activeFilters.time = filterValue;
          document.querySelectorAll('.filter-btn[data-filter-type="all"]').forEach(btn => btn.classList.remove('active'));
          document.querySelectorAll('.filter-btn[data-filter-type="time"]').forEach(btn => btn.classList.remove('active'));
          button.classList.add('active');
        } else if (filterType === 'topic') {
          if (activeFilters.topic === filterValue) {
            activeFilters.topic = 'All';
            button.classList.remove('active');
          } else {
            activeFilters.topic = filterValue;
            document.querySelectorAll('.filter-btn[data-filter-type="all"]').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.filter-btn[data-filter-type="topic"]').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
          }
        }
        applyFilter();
      });
    });
    applyFilter();

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.055;
    controls.enablePan = false;
    controls.enableZoom = true;
    controls.minDistance = 5;
    controls.maxDistance = 15;
    controls.enableRotate = true;
    controls.minPolarAngle = 0;
    controls.maxPolarAngle = Math.PI;
    controls.rotateSpeed = 0.26;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 1.8;
    controls.target.set(0, -0.4, 0);
    controls.update();

    function resize() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      camera.aspect = w / h;
      camera.position.z = w < 768 ? 13.8 : 12.2;
      camera.position.y = w < 768 ? 1.6 : 1.2;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.5));
      globe.scale.setScalar(w < 768 ? 0.82 : Math.min(1.06, Math.max(0.92, h / 960)));
    }
    window.addEventListener('resize', resize, { passive: true });
    resize();

    function animate() {
      const elapsed = clock.getElapsedTime();

      const pulse = 1 + Math.sin(elapsed * 1.1) * 0.006;
      grid.scale.setScalar(pulse);
      continentGroup.scale.setScalar(1 + Math.sin(elapsed * 0.9 + 0.8) * 0.0035);

      _uTime.value = elapsed;

      // Update instanced marker pulse via instance matrix
      const dummy = new THREE.Object3D();
      let needsUpdate = false;
      for (let i = 0; i < count; i++) {
        const data = markerData[i];
        const isHovered = data === hoveredData;
        const target = isHovered ? 1.85 : 1 + Math.sin(elapsed * 2.6 + i * 0.47) * 0.09;
        const prev = data.instanceScale;
        data.instanceScale += (target - prev) * 0.18;
        const s = data.instanceScale;
        const op = isHovered ? 1 : 0.82 + Math.sin(elapsed * 2.2 + i) * 0.12;
        data.instanceOpacity += (op - data.instanceOpacity) * 0.18;
        const gop = isHovered ? 0.36 : 0.14 + Math.sin(elapsed * 1.8 + i) * 0.05;
        data.glowOpacity += (gop - data.glowOpacity) * 0.18;

        if (Math.abs(s - prev) > 0.001) {
          instancedMarkers.getMatrixAt(i, dummy.matrix);
          const pos = new THREE.Vector3().setFromMatrixPosition(dummy.matrix);
          dummy.position.copy(pos);
          dummy.scale.set(s, s, s);
          dummy.updateMatrix();
          instancedMarkers.setMatrixAt(i, dummy.matrix);
          needsUpdate = true;
        }
      }
      if (needsUpdate) instancedMarkers.instanceMatrix.needsUpdate = true;

      // ── Country label on zoom ──
      const camDist = camera.position.distanceTo(controls.target);
      if (camDist < ZOOM_THRESHOLD && countryLookup.length) {
        // Ray from camera through screen center → globe surface
        const centerNdc = new THREE.Vector3(0, 0, 0.5);
        centerNdc.unproject(camera);
        const rayDir = centerNdc.sub(camera.position).normalize();
        const globeCenter = new THREE.Vector3(0, -0.8, 0);
        const toCam = new THREE.Vector3().copy(camera.position).sub(globeCenter);
        const a = rayDir.dot(rayDir);
        const b = 2 * rayDir.dot(toCam);
        const c = toCam.dot(toCam) - R * R;
        const disc = b * b - 4 * a * c;
        if (disc >= 0) {
          const t = (-b - Math.sqrt(disc)) / (2 * a);
          if (t > 0) {
            // World → globe local space (undo rotation + translation)
            const hitWorld = new THREE.Vector3().copy(camera.position).add(rayDir.clone().multiplyScalar(t));
            const local = hitWorld.sub(globeCenter).applyQuaternion(globe.quaternion.clone().invert());
            const nx = local.x / R, ny = local.y / R, nz = local.z / R;
            const lat = 90 - THREE.MathUtils.radToDeg(Math.acos(Math.min(1, Math.max(-1, ny))));
            const lon = THREE.MathUtils.radToDeg(Math.atan2(nz, -nx)) - 180;
            const country = findCountry(lon, lat);
            if (country && country !== lastCountryLabel) {
              countryNameEl.textContent = country.name;
              countryCountEl.textContent = country.count + ' article' + (country.count !== 1 ? 's' : '');
              countryLabelEl.classList.add('visible');
              lastCountryLabel = country;
            } else if (!country && lastCountryLabel) {
              countryLabelEl.classList.remove('visible');
              lastCountryLabel = null;
            }
          }
        }
      } else if (lastCountryLabel) {
        countryLabelEl.classList.remove('visible');
        lastCountryLabel = null;
      }

      // ── Country label sprite opacity & size by zoom ──
      const labelGroup = window._countryLabels;
      if (labelGroup) {
        const globeCenter = new THREE.Vector3(0, -0.8, 0);
        labelGroup.children.forEach(sprite => {
          // Compute world position via globe's world matrix
          const worldPos = new THREE.Vector3();
          worldPos.copy(sprite.position);
          globe.localToWorld(worldPos);
          // Check if on front face
          const toSprite = new THREE.Vector3().copy(worldPos).sub(globeCenter);
          const toCam = new THREE.Vector3().copy(camera.position).sub(globeCenter);
          const facing = toSprite.dot(toCam);
          // Front face only
          if (facing <= 0) { sprite.material.opacity = 0; return; }

          // Project to screen to check visible size
          worldPos.project(camera);
          const screenX = (worldPos.x * 0.5 + 0.5) * window.innerWidth;
          const screenY = (-worldPos.y * 0.5 + 0.5) * window.innerHeight;
          // Skip if outside viewport (with margin)
          if (screenX < -200 || screenX > window.innerWidth + 200 ||
              screenY < -200 || screenY > window.innerHeight + 200) {
            sprite.material.opacity = 0; return;
          }

          // Compute screen-space label width (approximate)
          const spriteWorldSize = sprite.userData.baseScale || sprite.scale.x;
          const labelWidth = spriteWorldSize * 600 / camDist; // ~pixels on screen
          // Hide if label would be wider than 25% of viewport
          if (labelWidth > window.innerWidth * 0.25) {
            sprite.material.opacity = 0; return;
          }

          // Distance fade: visible only in a specific range
          const opacity = Math.min(1, Math.max(0,
            1 - Math.abs(camDist - 9) / 4
          ));
          sprite.material.opacity = opacity;

          // Fixed small screen size regardless of zoom
          const screenScale = 0.3 + 0.7 * Math.min(1, labelWidth / 120);
          const finalScale = spriteWorldSize * screenScale * 0.3;
          sprite.scale.set(finalScale, finalScale * 0.25, 1);
        });
      }

      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
