<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChainLens — AI-powered world news aggregator</title>
  <meta name="description" content="ChainLens — AI-powered world news aggregator" />
  <style>
    :root {
      --bg: #050611;
      --text: #eef7ff;
      --muted: #8892b6;
      --cyan: #22d3ee;
      --cyan-soft: #67e8f9;
      --accent: #6366f1;
      --violet: #a78bfa;
      --orange: #f59e0b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      min-height: 100%;
      overflow: hidden;
      background: #000;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
    }

    body {
      min-height: 100dvh;
      background:
        radial-gradient(circle at 68% 44%, rgba(34, 211, 238, 0.17), transparent 25%),
        radial-gradient(circle at 45% 54%, rgba(99, 102, 241, 0.22), transparent 28%),
        radial-gradient(circle at 18% 24%, rgba(245, 158, 11, 0.08), transparent 22%),
        linear-gradient(135deg, #02030a 0%, #050611 46%, #08091c 100%);
    }

    #hero {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      isolation: isolate;
    }

    #hero::before,
    #hero::after {
      content: "";
      position: absolute;
      inset: -18%;
      z-index: 0;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    #hero::before {
      opacity: 0.48;
      background:
        conic-gradient(from 224deg at 61% 45%, transparent 0deg, rgba(34, 211, 238, 0.18) 34deg, transparent 78deg, rgba(99, 102, 241, 0.16) 126deg, transparent 180deg, rgba(34, 211, 238, 0.10) 260deg, transparent 360deg);
      filter: blur(42px) saturate(1.25);
      animation: auroraDrift 18s ease-in-out infinite alternate;
    }

    #hero::after {
      opacity: 0.18;
      background-image:
        linear-gradient(rgba(255,255,255,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.045) 1px, transparent 1px);
      background-size: 78px 78px;
      mask-image: radial-gradient(circle at 55% 48%, black 0%, transparent 68%);
      transform: perspective(900px) rotateX(63deg) translateY(17%);
    }

    #globe-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      cursor: grab;
      touch-action: none;
      z-index: 0;
      filter: saturate(1.14) contrast(1.06) drop-shadow(0 0 34px rgba(34, 211, 238, 0.18));
    }

    #globe-canvas:active { cursor: grabbing; }


    .filter-bar {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      width: min(920px, calc(100vw - 32px));
      padding: 10px 12px;
      border: 1px solid rgba(103, 232, 249, 0.24);
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(8, 14, 31, 0.72), rgba(3, 6, 18, 0.58));
      backdrop-filter: blur(18px) saturate(1.2);
      -webkit-backdrop-filter: blur(18px) saturate(1.2);
      box-shadow: 0 22px 80px rgba(0, 0, 0, 0.32), 0 0 42px rgba(34, 211, 238, 0.14), inset 0 1px 0 rgba(255,255,255,0.08), inset 0 0 28px rgba(99, 102, 241, 0.08);
    }

    .filter-btn {
      appearance: none;
      border: 1px solid rgba(136, 136, 160, 0.28);
      border-radius: 999px;
      background: rgba(15, 22, 44, 0.64);
      color: rgba(238, 247, 255, 0.80);
      cursor: pointer;
      font: inherit;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 8px 12px;
      text-transform: uppercase;
      transition: border-color 160ms ease, color 160ms ease, background 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    .filter-btn:hover,
    .filter-btn.active {
      border-color: rgba(34, 211, 238, 0.72);
      background: rgba(34, 211, 238, 0.14);
      color: #eaffff;
      box-shadow: 0 0 18px rgba(34, 211, 238, 0.22);
      transform: translateY(-1px);
    }

    .filter-btn[data-filter-type="topic"][data-filter-value="Bitcoin"].active { border-color: rgba(249, 115, 22, 0.85); box-shadow: 0 0 20px rgba(249, 115, 22, 0.2); }
    .filter-btn[data-filter-type="topic"][data-filter-value="DeFi"].active { border-color: rgba(34, 197, 94, 0.85); box-shadow: 0 0 20px rgba(34, 197, 94, 0.2); }
    .filter-btn[data-filter-type="topic"][data-filter-value="AI"].active { border-color: rgba(59, 130, 246, 0.85); box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
    .filter-btn[data-filter-type="topic"][data-filter-value="Regulation"].active { border-color: rgba(239, 68, 68, 0.85); box-shadow: 0 0 20px rgba(239, 68, 68, 0.2); }

    .article-tooltip {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 5;
      width: min(340px, calc(100vw - 28px));
      pointer-events: none;
      opacity: 0;
      transform: translate3d(-999px, -999px, 0) scale(0.96);
      transition: opacity 120ms ease, transform 120ms ease;
      padding: 14px 16px;
      border: 1px solid rgba(34, 211, 238, 0.34);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(7, 10, 22, 0.94), rgba(3, 6, 16, 0.9));
      box-shadow: 0 0 34px rgba(34, 211, 238, 0.18), inset 0 0 24px rgba(99, 102, 241, 0.08);
      backdrop-filter: blur(16px);
    }

    .article-tooltip.visible { opacity: 1; }
    .tooltip-title { font-size: 16px; font-weight: 800; line-height: 1.35; color: #f7ffff; }
    .tooltip-source { margin-top: 5px; color: rgba(136, 136, 160, 0.9); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; }
    .tooltip-summary { margin-top: 10px; padding-left: 18px; color: rgba(228, 228, 236, 0.82); font-size: 13px; line-height: 1.55; }
    .tooltip-summary li { margin: 5px 0; }

    .hud {
      position: absolute;
      left: clamp(20px, 5vw, 72px);
      top: clamp(24px, 6vh, 72px);
      z-index: 2;
      pointer-events: none;
      max-width: min(780px, calc(100vw - 40px));
      padding: clamp(16px, 2.6vw, 24px);
      border: 1px solid rgba(103, 232, 249, 0.12);
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(5, 11, 28, 0.50), rgba(5, 8, 20, 0.18));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 0 44px rgba(34, 211, 238, 0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      text-shadow: 0 0 24px rgba(34, 211, 238, 0.28);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--cyan);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      opacity: 0.9;
    }

    .eyebrow::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--cyan);
      box-shadow: 0 0 18px var(--cyan), 0 0 34px var(--accent);
      animation: statusPulse 1.8s ease-in-out infinite;
    }

    h1 {
      margin-top: 14px;
      font-size: clamp(20px, 4vw, 48px);
      line-height: 0.94;
      letter-spacing: -0.06em;
      max-width: 760px;
      background: linear-gradient(135deg, #fff 0%, #eef7ff 34%, #67e8f9 63%, #a78bfa 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .subline {
      margin-top: 18px;
      color: rgba(228, 228, 236, 0.68);
      font-size: clamp(13px, 1.45vw, 17px);
      max-width: 520px;
      line-height: 1.8;
    }

    .signal-metrics {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
    }

    .metric {
      min-width: 108px;
      padding: 10px 12px;
      border: 1px solid rgba(103, 232, 249, 0.14);
      border-radius: 16px;
      background: rgba(3, 9, 24, 0.42);
      box-shadow: inset 0 0 18px rgba(34, 211, 238, 0.045);
    }

    .metric strong {
      display: block;
      color: #f7ffff;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .metric span {
      display: block;
      margin-top: 2px;
      color: rgba(136, 146, 182, 0.86);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .scanline {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.12;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.0) 0px,
        rgba(255,255,255,0.0) 3px,
        rgba(34,211,238,0.22) 4px,
        rgba(255,255,255,0.0) 5px
      );
      mix-blend-mode: screen;
    }

    .vignette {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 46%, transparent 0%, transparent 38%, rgba(0,0,0,0.28) 66%, rgba(0,0,0,0.8) 100%),
        linear-gradient(90deg, rgba(0,0,0,0.62), transparent 30%, transparent 70%, rgba(0,0,0,0.62));
    }

    .hint {
      position: absolute;
      right: clamp(16px, 4vw, 52px);
      bottom: clamp(16px, 4vh, 42px);
      z-index: 2;
      color: rgba(136, 136, 160, 0.75);
      font-size: 12px;
      letter-spacing: 0.08em;
      pointer-events: none;
    }

    .scroll-hint {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 8;
      color: rgba(136, 136, 160, 0.45);
      font-size: 11px;
      letter-spacing: 0.06em;
      pointer-events: none;
      animation: scrollPulse 3s ease-in-out infinite;
    }

    @keyframes scrollPulse {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 0.7; }
    }

    @keyframes statusPulse {
      0%, 100% { transform: scale(0.84); opacity: 0.65; }
      50% { transform: scale(1.2); opacity: 1; }
    }

    @media (max-width: 768px) {
      .hud { top: 28px; left: 20px; right: 20px; }
      .subline { max-width: 330px; }
      .hint { display: none; }
      .filter-bar { border-radius: 22px; bottom: 12px; padding: 8px; }
      .filter-btn { font-size: 10px; padding: 7px 9px; }
    }
  </style>
</head>

    // Detect a geo location from article title + summary.
    // Returns [lat, lon, displayName] on first regex match, or null.
    function detectGeoLocation(article) {
      const text = ((article.title || '') + ' ' + (article.ai_summary || '')).toLowerCase();
      for (const entry of GEO_KEYWORDS) {
        // Clone the regex so we can use .test() without lastIndex issues in a loop
        const re = new RegExp(entry.re.source, entry.re.flags);
        if (re.test(text)) {
          return entry.loc;
        }
      }
      return null;
    }

    const canvas = document.getElementById('globe-canvas');
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000005, 0.018);

    const camera = new THREE.PerspectiveCamera(36, window.innerWidth / window.innerHeight, 0.1, 120);
    camera.position.set(0, 1.2, 12.2);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true, powerPreference: 'high-performance' });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.5));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 1);
    const clock = new THREE.Clock();
    const globe = new THREE.Group();
    globe.rotation.set(0.03, -0.62, 0);
    globe.position.y = -0.8;
    scene.add(globe);

    const R = 4.15;
    const CYAN = new THREE.Color('#22d3ee');
    const ACCENT = new THREE.Color('#6366f1');

    function latLonToVec3(lat, lon, radius = R) {
      const phi = THREE.MathUtils.degToRad(90 - lat);
      const theta = THREE.MathUtils.degToRad(lon + 180);
      return new THREE.Vector3(
        -radius * Math.sin(phi) * Math.cos(theta),
        radius * Math.cos(phi),
        radius * Math.sin(phi) * Math.sin(theta)
      );
    }

    function makeLineMaterial({ color = '#22d3ee', opacity = 0.3, additive = true } = {}) {
      return new THREE.LineBasicMaterial({
        color,
        transparent: true,
        opacity,
        blending: additive ? THREE.AdditiveBlending : THREE.NormalBlending,
        depthWrite: false
      });
    }

    // Full-sphere wireframe: latitudes -80° to 80°, no opaque surface.
    const grid = new THREE.Group();
    const meridianMat = makeLineMaterial({ color: '#22d3ee', opacity: 0.16 });
    const latitudeMat = makeLineMaterial({ color: '#6366f1', opacity: 0.18 });
    const glowGridMat = makeLineMaterial({ color: '#22d3ee', opacity: 0.06 });

    for (let lat = -80; lat <= 80; lat += 10) {
      const points = [];
      for (let lon = -180; lon <= 180; lon += 3) points.push(latLonToVec3(lat, lon, R));
      const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(points), lat % 20 === 0 ? latitudeMat : glowGridMat);
      grid.add(line);
    }

    for (let lon = -180; lon < 180; lon += 10) {
      const points = [];
      for (let lat = -80; lat <= 80; lat += 2) points.push(latLonToVec3(lat, lon, R));
      const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(points), lon % 30 === 0 ? meridianMat : glowGridMat);
      grid.add(line);
    }
    globe.add(grid);

    // Faint sphere-cap aura (transparent wire-only accent; no opaque surface).
    const haloMaterial = new THREE.ShaderMaterial({
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      side: THREE.BackSide,
      uniforms: {
        uTime: { value: 0 },
        uCyan: { value: CYAN },
        uAccent: { value: ACCENT }
      },
      vertexShader: `
        varying vec3 vNormal;
        varying vec3 vWorld;
        void main() {
          vNormal = normalize(normalMatrix * normal);
          vec4 world = modelMatrix * vec4(position, 1.0);
          vWorld = world.xyz;
          gl_Position = projectionMatrix * viewMatrix * world;
        }
      `,
      fragmentShader: `
        uniform float uTime;
        uniform vec3 uCyan;
        uniform vec3 uAccent;
        varying vec3 vNormal;
        varying vec3 vWorld;
        void main() {
          float rim = pow(1.0 - abs(dot(normalize(vNormal), vec3(0.0, 0.0, 1.0))), 2.3);
          float pulse = 0.55 + 0.45 * sin(uTime * 1.45 + vWorld.y * 1.6);
          vec3 color = mix(uAccent, uCyan, 0.62 + 0.22 * sin(uTime));
          gl_FragColor = vec4(color, rim * 0.105 * pulse);
        }
      `
    });
    const halo = new THREE.Mesh(new THREE.SphereGeometry(R * 1.006, 64, 32), haloMaterial);
    globe.add(halo);

    const continentMaterial = new THREE.ShaderMaterial({
      transparent: true,
      depthWrite: false,
      depthTest: false,
      blending: THREE.AdditiveBlending,
      uniforms: {
        uTime: { value: 0 },
        uOpacity: { value: 0.62 },
        uColorA: { value: CYAN },
        uColorB: { value: ACCENT }
      },
      vertexShader: `
        attribute float aProgress;
        varying float vProgress;
        varying vec3 vWorld;
        void main() {
          vProgress = aProgress;
          vec4 world = modelMatrix * vec4(position, 1.0);
          vWorld = world.xyz;
          gl_Position = projectionMatrix * viewMatrix * world;
        }
      `,
      fragmentShader: `
        uniform float uTime;
        uniform float uOpacity;
        uniform vec3 uColorA;
        uniform vec3 uColorB;
        varying float vProgress;
        varying vec3 vWorld;
        void main() {
          // Fade the back half of the transparent globe so the coastlines read cleanly
          // instead of drawing every far-side continent over the front hemisphere.
          vec3 normal = normalize(vWorld);
          vec3 viewDir = normalize(cameraPosition - vWorld);
          float facing = smoothstep(-0.08, 0.34, dot(normal, viewDir));
          float limb = 0.38 + 0.62 * smoothstep(-0.02, 0.22, dot(normal, viewDir));
          float flow = smoothstep(0.92, 1.0, 1.0 - abs(fract(vProgress * 2.4 - uTime * 0.09) - 0.5) * 2.0);
          float spark = smoothstep(0.975, 1.0, 1.0 - abs(fract(vProgress * 7.0 - uTime * 0.18) - 0.5) * 2.0);
          vec3 color = mix(uColorB, uColorA, 0.72 + flow * 0.28);
          float alpha = uOpacity * facing * limb * (0.58 + flow * 0.34 + spark * 0.14);
          gl_FragColor = vec4(color, alpha);
        }
      `
    });

    const continentGlowMaterial = continentMaterial.clone();
    continentGlowMaterial.uniforms = THREE.UniformsUtils.clone(continentMaterial.uniforms);
    continentGlowMaterial.uniforms.uOpacity.value = 0.18;
    continentGlowMaterial.uniforms.uColorA.value = new THREE.Color('#67e8f9');
    continentGlowMaterial.uniforms.uColorB.value = new THREE.Color('#818cf8');

    const continentGroup = new THREE.Group();
    const landFillGroup = new THREE.Group();

    // Natural Earth 50m has beautiful source geometry, but its raw coastline
    // vertex density turns intricate regions (fjords, island chains, peninsulas)
    // into bright clumps on a small hologram. Simplify in lon/lat space before
    // generating Three.js line geometry so we keep recognizable continents with
    // far fewer overlapping neon segments.
    const COASTLINE_SIMPLIFY_TOLERANCE = 0.32; // degrees; ~35km at equator
    const LAND_TEXTURE_SIMPLIFY_TOLERANCE = 0.18;
    const MIN_OUTLINE_AREA = 0.12;

    const textureSize = window.innerWidth < 768 ? 1024 : 2048;
    const landCanvas = document.createElement('canvas');
    landCanvas.width = textureSize;
    landCanvas.height = textureSize / 2;
    const landCtx = landCanvas.getContext('2d');
    const landTexture = new THREE.CanvasTexture(landCanvas);
    landTexture.minFilter = THREE.LinearFilter;
    landTexture.magFilter = THREE.LinearFilter;
    landTexture.generateMipmaps = false;
    landTexture.anisotropy = Math.min(4, renderer.capabilities.getMaxAnisotropy());

    const landFillMaterial = new THREE.MeshBasicMaterial({
      map: landTexture,
      transparent: true,
      opacity: 0.72,
      blending: THREE.AdditiveBlending,
      side: THREE.FrontSide,
      depthWrite: false,
      depthTest: false
    });

    function unwrapRing(ring) {
      if (!ring || !ring.length) return [];
      const unwrapped = [[ring[0][0], ring[0][1]]];
      let previous = ring[0][0];
      let offset = 0;
      for (let i = 1; i < ring.length; i++) {
        const [rawLon, lat] = ring[i];
        let lon = rawLon + offset;
        while (lon - previous > 180) lon -= 360;
        while (lon - previous < -180) lon += 360;
        offset = lon - rawLon;
        unwrapped.push([lon, lat]);
        previous = lon;
      }
      return unwrapped;
    }

    function sqSegmentDistance(point, start, end) {
      const x = point[0], y = point[1];
      const x1 = start[0], y1 = start[1];
      const dx = end[0] - x1;
      const dy = end[1] - y1;
      if (dx === 0 && dy === 0) {
        const sx = x - x1;
        const sy = y - y1;
        return sx * sx + sy * sy;
      }
      const t = Math.max(0, Math.min(1, ((x - x1) * dx + (y - y1) * dy) / (dx * dx + dy * dy)));
      const px = x1 + t * dx;
      const py = y1 + t * dy;
      const ex = x - px;
      const ey = y - py;
      return ex * ex + ey * ey;
    }

    function simplifyLineRdp(points, tolerance) {
      if (!points || points.length <= 2) return points ? points.slice() : [];
      const toleranceSq = tolerance * tolerance;
      const keep = new Uint8Array(points.length);
      keep[0] = 1;
      keep[points.length - 1] = 1;
      const stack = [[0, points.length - 1]];

      while (stack.length) {
        const [first, last] = stack.pop();
        let maxDistanceSq = 0;
        let index = -1;
        for (let i = first + 1; i < last; i++) {
          const distanceSq = sqSegmentDistance(points[i], points[first], points[last]);
          if (distanceSq > maxDistanceSq) {
            maxDistanceSq = distanceSq;
            index = i;
          }
        }
        if (index !== -1 && maxDistanceSq > toleranceSq) {
          keep[index] = 1;
          stack.push([first, index], [index, last]);
        }
      }

      const simplified = [];
      for (let i = 0; i < points.length; i++) {
        if (keep[i]) simplified.push(points[i]);
      }
      return simplified;
    }

    function simplifyRing(ring, tolerance = COASTLINE_SIMPLIFY_TOLERANCE) {
      const unwrapped = unwrapRing(ring);
      if (unwrapped.length <= 4) return unwrapped;

      const points = unwrapped.slice();
      const first = points[0];
      const last = points[points.length - 1];
      if (Math.abs(first[0] - last[0]) < 1e-9 && Math.abs(first[1] - last[1]) < 1e-9) {
        points.pop();
      }
      if (points.length <= 4) return points;

      // RDP is defined for open polylines. For a closed coast ring, split it at
      // the point farthest from the first vertex, simplify both arcs, then join.
      let splitIndex = 1;
      let maxDistanceSq = 0;
      for (let i = 1; i < points.length; i++) {
        const dx = points[i][0] - points[0][0];
        const dy = points[i][1] - points[0][1];
        const distanceSq = dx * dx + dy * dy;
        if (distanceSq > maxDistanceSq) {
          maxDistanceSq = distanceSq;
          splitIndex = i;
        }
      }

      const arcA = simplifyLineRdp(points.slice(0, splitIndex + 1), tolerance);
      const arcB = simplifyLineRdp(points.slice(splitIndex).concat([points[0]]), tolerance);
      const simplified = arcA.concat(arcB.slice(1, -1));

      // Never let simplification collapse an island/continent into a triangle.
      return simplified.length >= 4 ? simplified : points;
    }

    function lonLatToTexturePoint(lon, lat, xShift = 0) {
      return [
        ((lon + 180) / 360) * landCanvas.width + xShift,
        ((90 - lat) / 180) * landCanvas.height
      ];
    }

    function drawLandTexture(geoJson) {
      landCtx.clearRect(0, 0, landCanvas.width, landCanvas.height);
      landCtx.save();
      landCtx.fillStyle = 'rgba(14, 61, 104, 0.46)';
      landCtx.strokeStyle = 'rgba(34, 211, 238, 0.18)';
      landCtx.lineWidth = Math.max(1, landCanvas.width / 1600);

      function drawPolygon(poly, xShift) {
        landCtx.beginPath();
        poly.forEach((ring) => {
          const simplified = simplifyRing(ring, LAND_TEXTURE_SIMPLIFY_TOLERANCE);
          simplified.forEach(([lon, lat], i) => {
            const [x, y] = lonLatToTexturePoint(lon, lat, xShift);
            if (i === 0) landCtx.moveTo(x, y);
            else landCtx.lineTo(x, y);
          });
          landCtx.closePath();
        });
        landCtx.fill('evenodd');
        landCtx.stroke();
      }

      geoJson.features.forEach((feature) => {
        if (!feature.geometry) return;
        const polygons = feature.geometry.type === 'Polygon'
          ? [feature.geometry.coordinates]
          : feature.geometry.coordinates;
        [-landCanvas.width, 0, landCanvas.width].forEach(shift => {
          polygons.forEach(poly => drawPolygon(poly, shift));
        });
      });
      landCtx.restore();
      landTexture.needsUpdate = true;
    }

    function ringAreaApprox(ring) {
      let area = 0;
      const pts = unwrapRing(ring);
      for (let i = 0, j = pts.length - 1; i < pts.length; j = i++) {
        area += (pts[j][0] * pts[i][1]) - (pts[i][0] * pts[j][1]);
      }
      return Math.abs(area) * 0.5;
    }

    function addCoastRing(ring, index) {
      if (!ring || ring.length < 3) return;
      // Avoid turning tiny one-pixel islands into noisy neon confetti at globe
      // scale, then simplify the remaining coastline before creating line meshes.
      if (ring.length < 6 || ringAreaApprox(ring) < MIN_OUTLINE_AREA) return;
      const simplifiedRing = simplifyRing(ring);
      if (simplifiedRing.length < 4) return;

      const outlineRadius = R * 1.018;
      const glowRadius = R * 1.022;
      const closedRing = simplifiedRing.concat([simplifiedRing[0]]);
      const outlinePoints = closedRing.map(([lon, lat]) => latLonToVec3(lat, lon, outlineRadius));
      const glowPoints = closedRing.map(([lon, lat]) => latLonToVec3(lat, lon, glowRadius));
      const progress = new Float32Array(outlinePoints.length);
      for (let i = 0; i < outlinePoints.length; i++) progress[i] = i / Math.max(1, outlinePoints.length - 1) + index * 0.031;

      const outlineGeometry = new THREE.BufferGeometry().setFromPoints(outlinePoints);
      outlineGeometry.setAttribute('aProgress', new THREE.BufferAttribute(progress, 1));
      const glowGeometry = new THREE.BufferGeometry().setFromPoints(glowPoints);
      glowGeometry.setAttribute('aProgress', new THREE.BufferAttribute(progress, 1));

      const glowLine = new THREE.Line(glowGeometry, continentGlowMaterial);
      glowLine.renderOrder = 3;
      continentGroup.add(glowLine);

      const crispLine = new THREE.Line(outlineGeometry, continentMaterial);
      crispLine.renderOrder = 4;
      continentGroup.add(crispLine);
    }

    async function loadContinents() {
      try {
        const response = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/land-50m.json');
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        const land = topojson.feature(data, data.objects.land);
        drawLandTexture(land);

        const landFill = new THREE.Mesh(new THREE.SphereGeometry(R * 1.010, 64, 32), landFillMaterial);
        landFill.renderOrder = 2;
        landFillGroup.add(landFill);

        let ringIndex = 0;
        land.features.forEach((feature) => {
          if (!feature.geometry) return;
          const polygons = feature.geometry.type === 'Polygon'
            ? [feature.geometry.coordinates]
            : feature.geometry.coordinates;
          polygons.forEach(poly => {
            // Outer rings provide the clean continent/coastline silhouette. Drawing
            // inner lake holes as neon outlines made the globe look busy and jagged.
            addCoastRing(poly[0], ringIndex++);
          });
        });

        globe.add(landFillGroup);
        globe.add(continentGroup);
      } catch (error) {
        console.warn('Unable to load Natural Earth continent data:', error);
      }
    }

    loadContinents();

    // Neon equator ring and orbiting particles.
    const ringMat = new THREE.ShaderMaterial({
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      side: THREE.DoubleSide,
      uniforms: {
        uTime: { value: 0 },
        uColorA: { value: CYAN },
        uColorB: { value: ACCENT }
      },
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform float uTime;
        uniform vec3 uColorA;
        uniform vec3 uColorB;
        varying vec2 vUv;
        void main() {
          float radial = 1.0 - abs(vUv.y - 0.5) * 2.0;
          float dash = 0.55 + 0.45 * sin((vUv.x + uTime * 0.045) * 80.0);
          vec3 color = mix(uColorB, uColorA, radial);
          gl_FragColor = vec4(color, pow(radial, 0.8) * (0.38 + dash * 0.34));
        }
      `
    });
    const ring = new THREE.Mesh(new THREE.RingGeometry(R * 0.988, R * 1.024, 192, 4), ringMat);
    ring.rotation.x = Math.PI / 2;
    ring.position.y = 0.002;
    globe.add(ring);

    const ringParticleCount = 80;
    const ringPositions = new Float32Array(ringParticleCount * 3);
    const ringSeeds = new Float32Array(ringParticleCount);
    for (let i = 0; i < ringParticleCount; i++) {
      ringSeeds[i] = Math.random();
      const a = ringSeeds[i] * Math.PI * 2;
      const jitter = (Math.random() - 0.5) * 0.055;
      ringPositions[i * 3] = Math.cos(a) * (R + jitter);
      ringPositions[i * 3 + 1] = (Math.random() - 0.5) * 0.04;
      ringPositions[i * 3 + 2] = Math.sin(a) * (R + jitter);
    }
    const ringParticleGeom = new THREE.BufferGeometry();
    ringParticleGeom.setAttribute('position', new THREE.BufferAttribute(ringPositions, 3));
    ringParticleGeom.setAttribute('aSeed', new THREE.BufferAttribute(ringSeeds, 1));
    const ringParticleMat = new THREE.ShaderMaterial({
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      uniforms: { uTime: { value: 0 }, uColor: { value: CYAN } },
      vertexShader: `
        attribute float aSeed;
        uniform float uTime;
        varying float vSeed;
        void main() {
          vSeed = aSeed;
          vec3 p = position;
          float speed = 0.45 + aSeed * 0.9;
          float a = atan(p.z, p.x) + uTime * speed * 0.23;
          float r = length(p.xz) + sin(uTime * 2.0 + aSeed * 20.0) * 0.025;
          p.x = cos(a) * r;
          p.z = sin(a) * r;
          p.y += sin(uTime * 4.0 + aSeed * 31.0) * 0.025;
          vec4 mv = modelViewMatrix * vec4(p, 1.0);
          gl_Position = projectionMatrix * mv;
          gl_PointSize = (2.0 + 4.2 * fract(aSeed * 17.0)) * (10.0 / -mv.z);
        }
      `,
      fragmentShader: `
        uniform vec3 uColor;
        varying float vSeed;
        void main() {
          vec2 uv = gl_PointCoord - 0.5;
          float d = length(uv);
          float alpha = smoothstep(0.5, 0.0, d) * (0.45 + 0.55 * sin(vSeed * 40.0));
          gl_FragColor = vec4(uColor, alpha);
        }
      `
    });
    const ringParticles = new THREE.Points(ringParticleGeom, ringParticleMat);
    globe.add(ringParticles);

    // Sparse star field with subtle shader twinkle.
    const starCount = window.innerWidth < 800 ? 60 : 100;
    const starPositions = new Float32Array(starCount * 3);
    const starSeeds = new Float32Array(starCount);
    for (let i = 0; i < starCount; i++) {
      const radius = 18 + Math.random() * 34;
      const theta = Math.random() * Math.PI * 2;
      const y = (Math.random() - 0.35) * 20;
      starPositions[i * 3] = Math.cos(theta) * radius;
      starPositions[i * 3 + 1] = y;
      starPositions[i * 3 + 2] = Math.sin(theta) * radius - 9;
      starSeeds[i] = Math.random();
    }
    const starGeometry = new THREE.BufferGeometry();
    starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    starGeometry.setAttribute('aSeed', new THREE.BufferAttribute(starSeeds, 1));
    const starMaterial = new THREE.ShaderMaterial({
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      uniforms: { uTime: { value: 0 } },
      vertexShader: `
        attribute float aSeed;
        uniform float uTime;
        varying float vAlpha;
        void main() {
          float twinkle = 0.35 + 0.65 * sin(uTime * (0.5 + aSeed * 1.7) + aSeed * 30.0);
          vAlpha = 0.18 + twinkle * 0.45;
          vec4 mv = modelViewMatrix * vec4(position, 1.0);
          gl_Position = projectionMatrix * mv;
          gl_PointSize = (0.8 + aSeed * 1.8) * (14.0 / -mv.z);
        }
      `,
      fragmentShader: `
        varying float vAlpha;
        void main() {
          vec2 uv = gl_PointCoord - 0.5;
          float d = length(uv);
          float alpha = smoothstep(0.5, 0.02, d) * vAlpha;
          gl_FragColor = vec4(0.72, 0.88, 1.0, alpha);
        }
      `
    });
    scene.add(new THREE.Points(starGeometry, starMaterial));



    const topicColors = {
      Bitcoin: '#f97316',
      Ethereum: '#818cf8',
      DeFi: '#22c55e',
      AI: '#3b82f6',
      Regulation: '#ef4444',
      Policy: '#eab308',
      Crypto: '#6366f1',
      Finance: '#22d3ee',
      Tech: '#a78bfa',
      General: '#8888a0'
    };

    function regionFor(lat, lon) {
      if (lon >= -170 && lon <= -25) return 'Americas';
      if (lon >= -25 && lon <= 55 && lat >= 30) return 'Europe';
      return 'Asia';
    }

    function summaryBullets(text) {
      return String(text || '')
        .split(/\n+/)
        .map(line => line.trim())
        .filter(line => line.startsWith('•'))
        .map(line => line.replace(/^•\s*/, '').trim())
        .filter(Boolean)
        .slice(0, 5);
    }

    const markerGroup = new THREE.Group();
    const markerMeshes = [];
    const markerGeometry = new THREE.SphereGeometry(0.095, 16, 12);
    const glowGeometry = new THREE.SphereGeometry(0.19, 16, 12);

    NEWS_DATA.articles.slice(0, 100).forEach((article, index) => {
      if (!article.ai_summary) return;

      // 1) Try content-based geo-tagging first
      let baseLat, baseLon, city;
      const geoMatch = detectGeoLocation(article);
      if (geoMatch) {
        [baseLat, baseLon, city] = geoMatch;
      } else {
        // 2) Fall back to source location
        const srcLoc = NEWS_DATA.sourceLocations[article.source];
        if (!srcLoc) return;
        [baseLat, baseLon, city] = srcLoc;
      }

      // Jitter to avoid overlap (tighter spread than before: ±0.8° lat, ±1.2° lon)
      const latOffset = (Math.random() - 0.5) * 1.6;
      const lonOffset = (Math.random() - 0.5) * 2.4;
      const lat = THREE.MathUtils.clamp(baseLat + latOffset, -90, 90);
      const lon = THREE.MathUtils.clamp(baseLon + lonOffset, -180, 180);

      const topic = topicColors[article.topic] ? article.topic : (topicColors[article.category] ? article.category : 'General');
      const color = new THREE.Color(topicColors[topic] || topicColors.General);
      const markerMaterial = new THREE.MeshBasicMaterial({
        color,
        transparent: true,
        opacity: 0.96,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      });
      const glowMaterial = new THREE.MeshBasicMaterial({
        color,
        transparent: true,
        opacity: 0.18,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      });
      const marker = new THREE.Mesh(markerGeometry, markerMaterial);
      const glow = new THREE.Mesh(glowGeometry, glowMaterial);
      marker.add(glow);
      marker.position.copy(latLonToVec3(lat, lon, R * 1.035));
      marker.userData = {
        article,
        topic,
        region: regionFor(baseLat, baseLon),
        city,
        baseScale: 1,
        glow
      };
      markerGroup.add(marker);
      markerMeshes.push(marker);
    });
    globe.add(markerGroup);

    const tooltip = document.getElementById('article-tooltip');
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2(-10, -10);
    let hoveredMarker = null;
    let activeFilters = { time: 'all', region: 'All', topic: 'All' };

    function markerMatchesFilter(marker) {
      if (activeFilters.region !== 'All' && marker.userData.region !== activeFilters.region) return false;
      if (activeFilters.topic !== 'All' && marker.userData.topic !== activeFilters.topic) return false;
      if (activeFilters.time !== 'all') {
        const published = marker.userData.article.published;
        if (!published) return false;
        const pubTime = Date.parse(published);
        if (isNaN(pubTime)) return false;
        const hoursAgo = (Date.now() - pubTime) / (1000 * 60 * 60);
        if (activeFilters.time === '6h' && hoursAgo > 6) return false;
        if (activeFilters.time === '24h' && hoursAgo > 24) return false;
      }
      return true;
    }

    function applyFilter() {
      markerMeshes.forEach(marker => {
        marker.visible = markerMatchesFilter(marker);
      });
      if (hoveredMarker && !hoveredMarker.visible) setHoveredMarker(null);
    }

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
    }

    let hoverCooldown = null;

    function setHoveredMarker(marker) {
      if (hoveredMarker === marker) return;
      if (hoverCooldown) { clearTimeout(hoverCooldown); hoverCooldown = null; }
      if (hoveredMarker) hoveredMarker.scale.setScalar(hoveredMarker.userData.baseScale);
      const wasHovering = !!hoveredMarker;
      hoveredMarker = marker;
      if (!marker) {
        tooltip.classList.remove('visible');
        if (wasHovering) {
          hoverCooldown = setTimeout(() => { controls.autoRotate = true; }, 500);
        }
        return;
      }
      if (!wasHovering) controls.autoRotate = false;
      const article = marker.userData.article;
      const bullets = summaryBullets(article.ai_summary);
      tooltip.innerHTML = `
        <div class="tooltip-title">${escapeHtml(article.title)}</div>
        <div class="tooltip-source">${escapeHtml(article.source)} · ${escapeHtml(marker.userData.city)} · ${escapeHtml(marker.userData.topic)}</div>
        <ul class="tooltip-summary">${bullets.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>
      `;
      tooltip.classList.add('visible');
      positionTooltip(marker);
    }

    function updatePointer(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    }

    function positionTooltip(marker) {
      if (!marker) return;
      const world = marker.getWorldPosition(new THREE.Vector3()).project(camera);
      const x = (world.x * 0.5 + 0.5) * window.innerWidth;
      const y = (-world.y * 0.5 + 0.5) * window.innerHeight;
      const offset = 18;
      const width = tooltip.offsetWidth || 320;
      const height = tooltip.offsetHeight || 170;
      const left = Math.round(Math.min(window.innerWidth - width - 14, Math.max(14, x + offset)));
      const top = Math.round(Math.min(window.innerHeight - height - 14, Math.max(14, y - height * 0.45)));
      tooltip.style.transform = `translate3d(${left}px, ${top}px, 0) scale(1)`;
    }

    renderer.domElement.addEventListener('pointermove', event => {
      updatePointer(event);
    }, { passive: true });

    renderer.domElement.addEventListener('pointerleave', () => {
      pointer.set(-10, -10);
      setHoveredMarker(null);
    }, { passive: true });

    renderer.domElement.addEventListener('click', () => {
      if (hoveredMarker && hoveredMarker.userData.article.url) {
        window.open(hoveredMarker.userData.article.url, '_blank', 'noopener,noreferrer');
      }
    });

    document.querySelectorAll('.filter-btn').forEach(button => {
      button.addEventListener('click', () => {
        const filterType = button.dataset.filterType;
        const filterValue = button.dataset.filterValue;

        if (filterType === 'all') {
          // Global reset: deactivate all, re-activate "All" + "ALL TIME"
          activeFilters = { time: 'all', region: 'All', topic: 'All' };
          document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
          document.querySelectorAll('.filter-btn[data-filter-type="all"]').forEach(btn => btn.classList.add('active'));
          document.querySelector('.filter-btn[data-filter-type="time"][data-filter-value="all"]').classList.add('active');
        } else if (filterType === 'region') {
          if (activeFilters.region === filterValue) {
            activeFilters.region = 'All';
            button.classList.remove('active');
            document.querySelector('.filter-btn[data-filter-type="all"]').classList.add('active');
          } else {
            activeFilters.region = filterValue;
            document.querySelectorAll('.filter-btn[data-filter-type="all"]').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.filter-btn[data-filter-type="region"]').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
          }
        } else if (filterType === 'time') {
          activeFilters.time = filterValue;
          document.querySelectorAll('.filter-btn[data-filter-type="all"]').forEach(btn => btn.classList.remove('active'));
          document.querySelectorAll('.filter-btn[data-filter-type="time"]').forEach(btn => btn.classList.remove('active'));
          button.classList.add('active');
        } else if (filterType === 'topic') {
          if (activeFilters.topic === filterValue) {
            activeFilters.topic = 'All';
            button.classList.remove('active');
          } else {
            activeFilters.topic = filterValue;
            document.querySelectorAll('.filter-btn[data-filter-type="all"]').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.filter-btn[data-filter-type="topic"]').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
          }
        }
        applyFilter();
      });
    });
    applyFilter();

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.055;
    controls.enablePan = false;
    controls.enableZoom = false;
    controls.enableRotate = true;
    controls.minPolarAngle = 0;
    controls.maxPolarAngle = Math.PI;
    controls.rotateSpeed = 0.26;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 1.8;
    controls.target.set(0, -0.4, 0);
    controls.update();

    function resize() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      camera.aspect = w / h;
      camera.position.z = w < 768 ? 13.8 : 12.2;
      camera.position.y = w < 768 ? 1.6 : 1.2;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.5));
      globe.scale.setScalar(w < 768 ? 0.82 : Math.min(1.06, Math.max(0.92, h / 960)));
    }
    window.addEventListener('resize', resize, { passive: true });
    resize();

    function animate() {
      const elapsed = clock.getElapsedTime();
      const delta = clock.getDelta();

      const pulse = 1 + Math.sin(elapsed * 1.1) * 0.006;
      grid.scale.setScalar(pulse);
      continentGroup.scale.setScalar(1 + Math.sin(elapsed * 0.9 + 0.8) * 0.0035);

      haloMaterial.uniforms.uTime.value = elapsed;
      continentMaterial.uniforms.uTime.value = elapsed;
      continentGlowMaterial.uniforms.uTime.value = elapsed;
      ringMat.uniforms.uTime.value = elapsed;
      ringParticleMat.uniforms.uTime.value = elapsed;
      starMaterial.uniforms.uTime.value = elapsed;

      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(markerMeshes.filter(marker => marker.visible), false);
      setHoveredMarker(hits.length ? hits[0].object : null);
      markerMeshes.forEach((marker, index) => {
        if (!marker.visible) return;
        const isHovered = marker === hoveredMarker;
        const target = isHovered ? 1.85 : 1 + Math.sin(elapsed * 2.6 + index * 0.47) * 0.09;
        marker.scale.lerp(new THREE.Vector3(target, target, target), 0.18);
        marker.material.opacity = isHovered ? 1 : 0.82 + Math.sin(elapsed * 2.2 + index) * 0.12;
        marker.userData.glow.material.opacity = isHovered ? 0.36 : 0.14 + Math.sin(elapsed * 1.8 + index) * 0.05;
      });
      positionTooltip(hoveredMarker);

      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
